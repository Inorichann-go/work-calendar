function formatPhone(el) {
  const digits = el.value.replace(/\D/g, '').slice(0, 11);
  if (digits.length <= 3) el.value = digits;
  else if (digits.length <= 7) el.value = digits.slice(0,3) + '-' + digits.slice(3);
  else el.value = digits.slice(0,3) + '-' + digits.slice(3,7) + '-' + digits.slice(7);
}

function toggleContractEnd() {
  const type = document.getElementById('hm-emptype').value;
  const wrap = document.getElementById('hm-contractend-wrap');
  wrap.style.display = (type === '계약직' || type === '촉탁직') ? '' : 'none';

}

function calcHireInfo() {
  const ssn1 = document.getElementById('hm-ssn1').value;
  const ssn2 = document.getElementById('hm-ssn2').value;
  const genderEl = document.getElementById('hm-gender');
  const ageEl = document.getElementById('hm-age');
  if (ssn1.length === 6 && ssn2.length === 1) {
    const code = parseInt(ssn2);
    genderEl.textContent = [1,3,5,7,9].includes(code) ? '남' : '여';
    const century = [1,2,5,6].includes(code) ? 1900 : 2000;
    const by = century + parseInt(ssn1.slice(0,2));
    const bm = parseInt(ssn1.slice(2,4)), bd = parseInt(ssn1.slice(4,6));
    const now = new Date();
    let age = now.getFullYear() - by;
    if (now.getMonth()+1 < bm || (now.getMonth()+1===bm && now.getDate()<bd)) age--;
    ageEl.textContent = `(만 ${age}세)`;
  } else { genderEl.textContent = ''; ageEl.textContent = ''; }
}

function saveHireInfo() {
  const name = document.getElementById('hm-name').value.trim();
  const empId = document.getElementById('hm-empid').value.trim();
  const team = document.getElementById('hm-team').value;
  const joinDate = document.getElementById('hm-joindate').value;
  const ssn1 = document.getElementById('hm-ssn1').value.trim();
  const ssn2 = document.getElementById('hm-ssn2').value.trim();
  const phone = document.getElementById('hm-phone').value.trim();
  const addr = document.getElementById('hm-addr').value.trim();
  const memo = document.getElementById('hm-memo').value.trim();
  const errEl = document.getElementById('hm-error');
  if (!name) { errEl.textContent = '이름을 입력해주세요.'; return; }
  if (!joinDate) { errEl.textContent = '입사일을 입력해주세요.'; return; }
  const hireInfo = { ssn1, ssn2, phone, addr, memo,
    emptype: document.getElementById('hm-emptype').value,
    contractend: document.getElementById('hm-contractend').value || '' };
  const idxStr = document.getElementById('hire-modal').getAttribute('data-emp-idx');
  const idx = parseInt(idxStr);
  if (!isNaN(idx) && idx >= 0 && employees[idx]) {
    employees[idx].hireInfo = hireInfo;
    employees[idx].joinDate = joinDate;
    employees[idx].name = name;
    employees[idx].empId = empId;
    employees[idx].team = team;
  } else {
    const no = Math.max(0, ...employees.map(e=>e.no||0)) + 1;
    employees.push({ no, name, empId, team, job:'', joinDate, transferDate:'', leaveDate:'', hours:8, memo:'', grade:'', parentalLeave:[], leaveHistory:[], hireInfo });
  }
  closeModal('hire-modal');
  // 직원 모달에서 열었으면 날짜/이름 자동 반영하고 직원 모달 다시 열기
  const fromEmp = document.getElementById('hire-modal').getAttribute('data-from-emp-modal');
  document.getElementById('hire-modal').removeAttribute('data-from-emp-modal');
  if (fromEmp === '1') {
    const emJoin = document.getElementById('em-join');
    if (emJoin) emJoin.value = joinDate;
    if (!isNaN(idx) && idx >= 0 && employees[idx]) {
      employees[idx].hireInfo = hireInfo;
    }
    document.getElementById('emp-modal').classList.add('show');
    renderHireTable();
    showToast('✅ 입사 정보가 저장됐습니다.');
    autoSave();
  } else {
    renderEmpTable();
    renderHireTable();
    showToast('✅ 입사 정보가 저장됐습니다.');
    autoSave();
  }
}

function saveResignInfo() {
  const leaveDate = document.getElementById('rm-leavedate').value;
  const reason = document.getElementById('rm-reason').value;
  const memo = document.getElementById('rm-memo').value.trim();
  const errEl = document.getElementById('rm-error');
  if (!leaveDate) { errEl.textContent = '퇴사일을 입력해주세요.'; return; }
  if (!reason) { errEl.textContent = '퇴사사유를 선택해주세요.'; return; }

  const idx = parseInt(document.getElementById('resign-modal').getAttribute('data-emp-idx'));
  const fromEmp = document.getElementById('resign-modal').getAttribute('data-from-emp-modal');

  // 기존 직원이면 바로 저장, 신규(-1)면 직원 모달에 날짜만 반영
  if (!isNaN(idx) && idx >= 0 && employees[idx]) {
    employees[idx].leaveDate = leaveDate;
    employees[idx].resignInfo = { reason, memo };
  }

  closeModal('resign-modal');
  document.getElementById('resign-modal').removeAttribute('data-from-emp-modal');

  if (fromEmp === '1') {
    const emLeave = document.getElementById('em-leave');
    if (emLeave) emLeave.value = leaveDate;
    document.getElementById('emp-modal').classList.add('show');
    renderResignTable();
    showToast('✅ 퇴사 정보가 저장됐습니다.');
    autoSave();
  } else {
    renderEmpTable();
    renderResignTable();
    showToast('✅ 퇴사 처리가 완료됐습니다.');
    autoSave();
  }
}

function renderHireTable() {
  const year = parseInt(document.getElementById('hire-year')?.value || new Date().getFullYear());
  const month = document.getElementById('hire-month')?.value || '';
  const q = (document.getElementById('hire-search')?.value || '').trim();
  let list = employees.filter(e => {
    if (!e.joinDate) return false;
    if (parseInt(e.joinDate.slice(0,4)) !== year) return false;
    if (month && parseInt(e.joinDate.slice(5,7)) !== parseInt(month)) return false;
    if (q && !e.name.includes(q) && !(e.empId||'').includes(q)) return false;
    return true;
  }).sort((a,b) => a.joinDate.localeCompare(b.joinDate));
  const cntEl = document.getElementById('hire-count');
  if (cntEl) cntEl.textContent = `총 ${list.length}명`;
  const tbody = document.getElementById('hire-tbody');
  if (!tbody) return;
  tbody.innerHTML = list.map((e,i) => {
    const info = e.hireInfo || {};
    const ssn = info.ssn1 ? `${info.ssn1}-${info.ssn2||'?'}` : '-';
    let gender='-', age='-';
    if (info.ssn1?.length===6 && info.ssn2) {
      const code=parseInt(info.ssn2);
      gender=[1,3,5,7,9].includes(code)?'남':'여';
      const century=[1,2,5,6].includes(code)?1900:2000;
      const by=century+parseInt(info.ssn1.slice(0,2)), bm=parseInt(info.ssn1.slice(2,4)), bd=parseInt(info.ssn1.slice(4,6));
      const now=new Date(); let a=now.getFullYear()-by;
      if(now.getMonth()+1<bm||(now.getMonth()+1===bm&&now.getDate()<bd))a--;
      age=a+'세';
    }
    const emptypeBadge = info.emptype
      ? `<span style="font-size:11px;padding:2px 7px;border-radius:10px;background:${info.emptype==='정규직'?'#eff4ff':info.emptype==='계약직'?'#fff7ed':'#f5f3ff'};color:${info.emptype==='정규직'?'#2563eb':info.emptype==='계약직'?'#c2410c':'#7c3aed'};border:1px solid ${info.emptype==='정규직'?'#bfdbfe':info.emptype==='계약직'?'#fed7aa':'#ddd6fe'};">${info.emptype}</span>` : '-';
    const empIdx = employees.findIndex(emp => emp.name === e.name && emp.empId === e.empId);
    const editBtn = `<td style="text-align:center;"><button class="btn" onclick="openEditEmpModal(${empIdx})" style="padding:4px 6px;font-size:11px;" title="직원 정보 수정"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button></td>`;
    return `<tr><td>${i+1}</td><td style="font-weight:700;">${e.name}</td><td style="font-size:11px;color:var(--text2);">${e.empId||'-'}</td><td>${getTeamBadge(e.team,'font-size:10px;')}</td><td style="font-size:12px;">${e.joinDate}</td><td style="font-size:12px;">${emptypeBadge}</td><td style="font-size:12px;color:var(--text2);">${info.contractend||'-'}</td><td style="font-size:12px;">${gender}</td><td style="font-size:12px;">${age}</td><td style="font-size:12px;font-family:var(--mono);">${ssn}</td><td style="font-size:12px;">${info.phone||'-'}</td><td style="font-size:12px;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${info.addr||''}">${info.addr||'-'}</td><td style="font-size:12px;color:var(--text2);">${info.memo||'-'}</td>${editBtn}</tr>`;
  }).join('') || '<tr><td colspan="14" style="text-align:center;color:var(--text3);padding:30px;">해당 기간 입사자 없음</td></tr>';
}

function renderResignTable() {
  const year = parseInt(document.getElementById('resign-year')?.value || new Date().getFullYear());
  const month = document.getElementById('resign-month')?.value || '';
  const q = (document.getElementById('resign-search')?.value || '').trim();
  let list = employees.filter(e => {
    if (!e.leaveDate) return false;
    if (parseInt(e.leaveDate.slice(0,4)) !== year) return false;
    if (month && parseInt(e.leaveDate.slice(5,7)) !== parseInt(month)) return false;
    if (q && !e.name.includes(q) && !(e.empId||'').includes(q)) return false;
    return true;
  }).sort((a,b) => a.leaveDate.localeCompare(b.leaveDate));
  const cntEl = document.getElementById('resign-count');
  if (cntEl) cntEl.textContent = `총 ${list.length}명`;
  const tbody = document.getElementById('resign-tbody');
  if (!tbody) return;
  tbody.innerHTML = list.map((e,i) => {
    const info = e.resignInfo || {};
    let tenure='-';
    if (e.joinDate && e.leaveDate) {
      const days=Math.floor((new Date(e.leaveDate)-new Date(e.joinDate))/86400000);
      const y=Math.floor(days/365), m=Math.floor((days%365)/30);
      tenure=y>0?`${y}년 ${m}개월`:`${m}개월`;
    }
    const empIdx = employees.findIndex(emp => emp.name === e.name && emp.empId === e.empId);
    const editBtn = `<td style="text-align:center;"><button class="btn" onclick="openEditEmpModal(${empIdx})" style="padding:4px 6px;font-size:11px;" title="직원 정보 수정"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button></td>`;
    return `<tr><td>${i+1}</td><td style="font-weight:700;">${e.name}</td><td style="font-size:11px;color:var(--text2);">${e.empId||'-'}</td><td>${getTeamBadge(e.team,'font-size:10px;')}</td><td style="font-size:12px;">${e.joinDate||'-'}</td><td style="font-size:12px;color:var(--danger);">${e.leaveDate}</td><td style="font-size:12px;">${tenure}</td><td style="font-size:12px;"><span style="background:var(--surface2);padding:2px 8px;border-radius:12px;border:1px solid var(--border);">${info.reason||'-'}</span></td><td style="font-size:12px;color:var(--text2);">${info.memo||'-'}</td>${editBtn}</tr>`;
  }).join('') || '<tr><td colspan="10" style="text-align:center;color:var(--text3);padding:30px;">해당 기간 퇴사자 없음</td></tr>';
}

let _pasteRows = []; // 파싱된 행 [{date,name,team,att,memo,status,year,month,day}]

function openPasteModal() {
  document.getElementById('paste-textarea').value = '';
  document.getElementById('paste-preview-wrap').style.display = 'none';
  document.getElementById('paste-preview-body').innerHTML = '';
  document.getElementById('paste-summary').textContent = '';
  document.getElementById('paste-apply-btn').disabled = true;
  document.getElementById('paste-apply-btn').style.opacity = '.4';
  _pasteRows = [];
  document.getElementById('paste-modal').classList.add('show');
  setTimeout(() => document.getElementById('paste-textarea').focus(), 100);
}

function parseDateStr(s) {
  // 지원 형식: 2026/7/6(월), 2026-07-06, 2026.7.6, 2026/07/06
  s = s.trim().replace(/\(.*?\)/, '').trim(); // 괄호 제거
  const m = s.match(/(\d{4})[\/\-\.](\d{1,2})[\/\-\.](\d{1,2})/);
  if (!m) return null;
  return { year: parseInt(m[1]), month: parseInt(m[2]), day: parseInt(m[3]) };
}

function parsePasteData() {
  const raw = document.getElementById('paste-textarea').value;
  if (!raw.trim()) {
    document.getElementById('paste-preview-wrap').style.display = 'none';
    document.getElementById('paste-apply-btn').disabled = true;
    document.getElementById('paste-apply-btn').style.opacity = '.4';
    _pasteRows = [];
    return;
  }

  const lines = raw.split('\n').filter(l => l.trim());
  const ATT_VALID = new Set(ATT_TYPES.filter(t => t));
  const rows = [];
  const seen = new Map(); // "name_ym_d" → index (중복 감지)

  for (const line of lines) {
    const cols = line.split('\t').map(c => c.trim());
    if (cols.length < 5) continue;

    const [dateStr, name, empId, team, attRaw, memo = ''] = cols;
    const att = attRaw.trim();
    const dateObj = parseDateStr(dateStr);

    let status = ''; // '✓ 신규', '△ 변경', '= 동일', '⚠ 중복', '✗ 오류'
    let statusColor = '';
    let errMsg = '';

    if (!dateObj) { status = '✗ 날짜 오류'; statusColor = '#dc2626'; rows.push({ dateStr, name, team, att, memo, status, statusColor, year:0, month:0, day:0 }); continue; }

    // 이름 매칭
    const empMatch = employees.find(e => e.name === name);
    if (!empMatch) { status = '✗ 미등록 이름'; statusColor = '#dc2626'; rows.push({ dateStr, name, team, att, memo, status, statusColor, ...dateObj }); continue; }

    // 근태 유형 검증
    if (!ATT_VALID.has(att)) { status = `✗ 알 수 없는 근태(${att})`; statusColor = '#dc2626'; rows.push({ dateStr, name, team, att, memo, status, statusColor, ...dateObj }); continue; }

    const { year, month, day } = dateObj;
    const ym = year + '_' + month;
    const key = `${name}_${ym}_${day}`;

    if (seen.has(key)) {
      // 중복
      rows[seen.get(key)].status = '⚠ 중복';
      rows[seen.get(key)].statusColor = '#d97706';
      status = '⚠ 중복'; statusColor = '#d97706';
    } else {
      seen.set(key, rows.length);
      const existing = attendance[name]?.[ym]?.[String(day)];
      const existingVal = (existing && typeof existing === 'object') ? existing.v : existing;
      if (!existingVal || existingVal === '') {
        status = '✓ 신규'; statusColor = '#16a34a';
      } else if (existingVal === att) {
        status = '= 동일'; statusColor = '#94a3b8';
      } else {
        status = `△ 변경 (${existingVal}→${att})`; statusColor = '#2563eb';
      }
    }
    rows.push({ dateStr, name, team, att, memo, status, statusColor, year, month, day });
  }

  _pasteRows = rows;

  // 미리보기 렌더
  const tbody = document.getElementById('paste-preview-body');
  const statusOrder = {'✓ 신규':0, '△':1, '= 동일':2, '⚠ 중복':3, '✗':4};
  tbody.innerHTML = rows.map((r, i) => {
    const attCls = ATT_CLASS[r.att] || '';
    return `<tr style="border-bottom:1px solid var(--border);${r.status.startsWith('=') ? 'opacity:.5' : ''}">
      <td style="padding:6px 10px;white-space:nowrap;">${r.dateStr}</td>
      <td style="padding:6px 10px;font-weight:600;">${r.name}</td>
      <td style="padding:6px 10px;font-size:11px;color:var(--text2);">${r.team}</td>
      <td style="padding:6px 10px;"><span class="att-cell ${attCls}" style="padding:2px 8px;font-size:11px;width:auto;min-width:unset;">${r.att}</span></td>
      <td style="padding:6px 10px;font-size:11px;color:var(--text3);">${r.memo}</td>
      <td style="padding:6px 10px;text-align:center;white-space:nowrap;font-size:11px;font-weight:600;color:${r.statusColor};">${r.status}</td>
    </tr>`;
  }).join('');

  // 요약
  const newCnt = rows.filter(r => r.status === '✓ 신규').length;
  const chgCnt = rows.filter(r => r.status.startsWith('△')).length;
  const sameCnt = rows.filter(r => r.status === '= 동일').length;
  const dupCnt = rows.filter(r => r.status === '⚠ 중복').length;
  const errCnt = rows.filter(r => r.status.startsWith('✗')).length;
  const applyable = newCnt + chgCnt;

  document.getElementById('paste-summary').innerHTML =
    `<span style="color:#16a34a;font-weight:600;">신규 ${newCnt}</span> &nbsp;` +
    `<span style="color:#2563eb;font-weight:600;">변경 ${chgCnt}</span> &nbsp;` +
    `<span style="color:#94a3b8;">동일 ${sameCnt}</span> &nbsp;` +
    (dupCnt ? `<span style="color:#d97706;">중복 ${dupCnt}</span> &nbsp;` : '') +
    (errCnt ? `<span style="color:#dc2626;">오류 ${errCnt}</span>` : '');

  document.getElementById('paste-preview-wrap').style.display = 'block';
  const btn = document.getElementById('paste-apply-btn');
  if (applyable > 0) {
    btn.disabled = false; btn.style.opacity = '1';
    btn.textContent = `적용하기 (${applyable}건)`;
  } else {
    btn.disabled = true; btn.style.opacity = '.4';
    btn.textContent = '적용하기';
  }
}

function applyPasteData() {
  let applied = 0;
  for (const r of _pasteRows) {
    if (r.status === '⚠ 중복' || r.status.startsWith('✗') || r.status === '= 동일') continue;
    const { name, year, month, day, att, memo } = r;
    setAtt(name, year, month, day, att, memo);
    // 결근이면 일요일 무급휴가 자동 적용
    if (att === '결근') applyAbsenceRules(name, year, month, day, true);
    // 결근 취소(결근→다른값)면 일요일 무급 원복
    const existingVal = (() => { const ex = attendance[name]?.[year+'_'+month]?.[String(day)]; return ex && typeof ex === 'object' ? ex.v : ex; })();
    if (existingVal && existingVal !== '결근' && r.status.startsWith('△')) applyAbsenceRules(name, year, month, day, false);
    applied++;
  }
  closeModal('paste-modal');
  renderAttTable();
  showToast(`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-2px;flex-shrink:0"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg> ${applied}건 적용 완료`);
  autoSave();
}

// ══════════════════════════════
//  TAB3: 월별 요약

function renderSummary() {
  const year = parseInt(document.getElementById('sum-year').value);
  const month = parseInt(document.getElementById('sum-month').value);
  const teamFilter = document.getElementById('sum-team').value;
  const statusFilter = document.getElementById('sum-status').value;
  const q = document.getElementById('sum-search').value.trim();
  const days = getDaysInMonth(year, month);

  let emps = employees.filter(e => {
    const tMatch = !teamFilter || e.team === teamFilter;
    const qMatch = !q || e.name.includes(q);
    const sMatch = !statusFilter || (() => {
      const s = getEmpStatus(e);
      if (statusFilter === 'active')  return s === 'active';
      if (statusFilter === 'onleave') return s === 'onleave';
      if (statusFilter === 'left')    return s === 'resigned';
      return true;
    })();
    return tMatch && qMatch && sMatch;
  });

  const totals = {출근:0,연차:0,반차:0,공가:0,청휴:0,결근:0,무급:0,보건:0,가족:0,병가:0,공휴일:0,유급:0};
  let rows = emps.map(e => {
    let cnt = {출근:0,연차:0,반차:0,공가:0,청휴:0,결근:0,무급휴가:0,보건:0,가족돌봄:0,병가:0,공휴일:0,유급:0};
    for (let d = 1; d <= days; d++) {
      const v = getAtt(e.name, year, month, d);
      if (v==='○') { cnt['출근']++; totals['출근']++; }
      else if (v==='연차') { cnt['연차']++; totals['연차']++; }
      else if (v==='반차') { cnt['반차']++; totals['반차']++; }
      else if (v==='공가') { cnt['공가']++; totals['공가']++; }
      else if (v==='청휴') { cnt['청휴']++; totals['청휴']++; }
      else if (v==='결근') { cnt['결근']++; totals['결근']++; }
      else if (v==='무급휴가') { cnt['무급휴가']++; totals['무급']++; }
      else if (v==='보건') { cnt['보건']++; totals['보건']++; }
      else if (v==='가족돌봄') { cnt['가족돌봄']++; totals['가족']++; }
      else if (v==='병가') { cnt['병가']++; totals['병가']++; }
      else if (v==='공휴일') { cnt['공휴일']++; totals['공휴일']++; }
      else if (v==='유급') { cnt['유급']++; totals['유급']++; }
    }
    return {e, cnt};
  });

  // 정렬
  if (sumSort.key) {
    rows.sort((a, b) => {
      let va, vb;
      if (sumSort.key === 'name') { va = a.e.name; vb = b.e.name; return va.localeCompare(vb,'ko') * sumSort.dir; }
      if (sumSort.key === 'team') { va = a.e.team; vb = b.e.team; return va.localeCompare(vb,'ko') * sumSort.dir; }
      va = a.cnt[sumSort.key] || 0; vb = b.cnt[sumSort.key] || 0;
      return (va - vb) * sumSort.dir;
    });
  }

  // 정렬 아이콘
  ['name','team','출근','연차','반차','결근'].forEach(k => {
    const el = document.getElementById('ssi-'+k);
    if (!el) return;
    el.className = 'sort-icon' + (sumSort.key===k ? (sumSort.dir===1?' asc':' desc') : '');
  });

  document.getElementById('stat-row').innerHTML = [
    {label:'재직 직원', val:emps.filter(e=>!e.leaveDate).length, unit:'명', icon:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-2px;flex-shrink:0"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>'},
    {label:'출근', val:totals['출근'], unit:'일', icon:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-2px;flex-shrink:0"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>'},
    {label:'연차', val:totals['연차'], unit:'일', icon:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-2px;flex-shrink:0"><circle cx="12" cy="12" r="3"/><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>'},
    {label:'결근', val:totals['결근'], unit:'일', icon:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-2px;flex-shrink:0"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>'},
    {label:'반차', val:totals['반차'], unit:'회', icon:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-2px;flex-shrink:0"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>'},
  ].map(s=>`
    <div class="stat-card">
      <div style="font-size:18px;margin-bottom:2px">${s.icon}</div>
      <div class="stat-val">${s.val}</div>
      <div class="stat-label">${s.label} <span style="font-size:10px">${s.unit}</span></div>
    </div>`).join('');

  const tbody = document.getElementById('sum-tbody');
  if (!rows.length) { tbody.innerHTML=`<tr><td colspan="15" class="empty-msg">데이터가 없습니다.</td></tr>`; return; }

  const totalPages = Math.max(1, Math.ceil(rows.length / PAGE_SIZE));
  if (sumPage > totalPages) sumPage = 1;
  const pages = document.getElementById('sum-pages');
  pages.innerHTML = '';
  for (let p = 1; p <= totalPages; p++) {
    const b = document.createElement('button');
    b.className = 'page-btn' + (p === sumPage ? ' active' : '');
    b.textContent = p;
    b.onclick = () => { sumPage = p; renderSummary(); };
    pages.appendChild(b);
  }
  const slice = rows.slice((sumPage-1)*PAGE_SIZE, sumPage*PAGE_SIZE);
  const startNo = (sumPage-1)*PAGE_SIZE;

  const n = v => `<span class="num ${v?'':'num-0'}">${v||0}</span>`;
  tbody.innerHTML = slice.map(({e,cnt},i) => {
    const sumPH = getParentalHours(e, year, month, 15);
    const sumParentalTag = sumPH !== null ? `<span class="parental-badge">단축${sumPH}h</span>` : '';
    return `<tr>
    <td style="color:var(--text3)">${startNo+i+1}</td>
    <td class="name-col" style="font-weight:600">${e.name}${sumParentalTag}</td>
    <td>${getTeamBadge(e.team,"font-size:10px;")}</td>
    <td>${n(cnt['출근'])}</td>
    <td>${n(cnt['연차'])}</td>
    <td>${n(cnt['반차'])}</td>
    <td>${n(cnt['공가'])}</td>
    <td>${n(cnt['청휴'])}</td>
    <td><span class="num ${cnt['결근']?'att-결근':'num-0'}">${cnt['결근']||0}</span></td>
    <td>${n(cnt['무급휴가'])}</td>
    <td>${n(cnt['보건'])}</td>
    <td>${n(cnt['가족돌봄'])}</td>
    <td>${n(cnt['병가'])}</td>
    <td>${n(cnt['공휴일'])}</td>
    <td>${n(cnt['유급'])}</td>
  </tr>`;
  }).join('');
  // 합계 행 업데이트 (전체 rows 기준 - 페이지 무관)
  const allTotals = {출근:0,연차:0,반차:0,공가:0,청휴:0,결근:0,무급휴가:0,보건:0,가족돌봄:0,병가:0,공휴일:0,유급:0};
  rows.forEach(({cnt}) => {
    Object.keys(allTotals).forEach(k => { allTotals[k] += cnt[k] || 0; });
  });
  const keys = ['출근','연차','반차','공가','청휴','결근','무급휴가','보건','가족돌봄','병가','공휴일','유급'];
  keys.forEach(k => {
    const el = document.getElementById('sum-tot-' + k);
    if (!el) return;
    const v = allTotals[k] || 0;
    el.innerHTML = v > 0 ? `<span class="num">${v}</span>` : `<span class="num num-0">-</span>`;
  });

}

function sortSum(key) {
  if (sumSort.key === key) sumSort.dir *= -1;
  else { sumSort.key = key; sumSort.dir = -1; }
  sumPage = 1;
  renderSummary();
}

function closeModal(id) {
  document.getElementById(id).classList.remove('show');
}
document.querySelectorAll('.modal-overlay').forEach(o => {
  o.addEventListener('click', e => { if (e.target === o) o.classList.remove('show'); });
});
function showToast(msg, isErr) {
  const t = document.getElementById('toast');
  t.innerHTML = msg;
  t.style.background = isErr ? 'var(--danger)' : 'var(--success)';
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

// ══════════════════════════════
//  연차 계산 엔진
// ══════════════════════════════

// 특정 연도의 특정 월에 결근이 있는지 체크
// 특정 달력 월에 결근 있는지 (기존 호환용)
function hasAbsentInMonth(name, year, month) {
  const days = getDaysInMonth(year, month);
  for (let d = 1; d <= days; d++) {
    if (getAtt(name, year, month, d) === '결근') return true;
  }
  return false;
}

// 날짜 구간(startDate ~ endDate-1일) 내에 결근 있는지 체크
// 1년미만 월별 연차용: 입사일 기준 구간
// 월별발생 만근체크: 결근 + leaveHistory(병가휴직 등) → 불인정 / 병가 직접입력 → 인정
const MONTHLY_NG_TYPES = new Set(['결근','병가휴직','가족돌봄휴직','육아휴직','산휴']);
const PROP_NG_TYPES    = new Set(['결근','병가','병가휴직','가족돌봄','가족돌봄휴직','육아휴직','산휴']);

function hasAbsentInRange(name, startDate, endDate) {
  const emp = employees.find(e => e.name === name);
  const cur = new Date(startDate);
  const end = new Date(endDate);
  while (cur < end) {
    const y = cur.getFullYear(), m = cur.getMonth()+1, d = cur.getDate();
    // 결근 직접입력 체크
    if (getAtt(name, y, m, d) === '결근') return true;
    // leaveHistory 병가휴직 등 체크
    if (emp) {
      const target = new Date(y, m-1, d);
      const onLeave = (emp.leaveHistory||[]).some(l => {
        if (!MONTHLY_NG_TYPES.has(l.type)) return false;
        const s = new Date(l.startDate.replace(/-/g,'/'));
        const e = l.endDate ? new Date(l.endDate.replace(/-/g,'/')) : new Date('9999/12/31');
        return target >= s && target <= e;
      });
      if (onLeave) return true;
    }
    cur.setDate(cur.getDate() + 1);
  }
  return false;
}

// 기간 내 실일수 계산 (비례연차용: 결근+병가+leaveHistory 모두 공제, 달력일수 기준)
function calcActualDaysInPeriod(emp, periodStart, periodEnd) {
  const totalDays = Math.round((periodEnd - periodStart) / 86400000) + 1;
  const absent = new Set();

  // leaveHistory 공제
  for (const l of (emp.leaveHistory||[])) {
    if (!PROP_NG_TYPES.has(l.type)) continue;
    const s = new Date(l.startDate.replace(/-/g,'/'));
    const e = l.endDate ? new Date(l.endDate.replace(/-/g,'/')) : new Date('9999/12/31');
    const os = s > periodStart ? s : periodStart;
    const oe = e < periodEnd   ? e : periodEnd;
    if (os <= oe) {
      const cur = new Date(os);
      while (cur <= oe) {
        absent.add(cur.toISOString().slice(0,10));
        cur.setDate(cur.getDate()+1);
      }
    }
  }

  // 직접입력 결근+병가 공제
  const ym_start = periodStart.getFullYear()*100 + periodStart.getMonth()+1;
  const ym_end   = periodEnd.getFullYear()*100   + periodEnd.getMonth()+1;
  const cur = new Date(periodStart);
  while (cur <= periodEnd) {
    const y=cur.getFullYear(), m=cur.getMonth()+1, d=cur.getDate();
    const v = getAtt(emp.name, y, m, d);
    if (PROP_NG_TYPES.has(v)) absent.add(cur.toISOString().slice(0,10));
    cur.setDate(cur.getDate()+1);
  }

  return totalDays - absent.size;
}

// 직원의 실제 현재 근무시간 반환 (육아단축 중이면 단축시간, 아니면 8h)
function getEffectiveHours(emp, refDate) {
  const d = refDate ? new Date(refDate) : new Date();
  const ph = getParentalHours(emp, d.getFullYear(), d.getMonth()+1, d.getDate());
  return ph !== null ? ph : 8;
}
function getParentalHours(emp, year, month, day) {
  if (!emp.parentalLeave || emp.parentalLeave.length === 0) return null;
  const target = new Date(year, month-1, day);
  for (const p of emp.parentalLeave) {
    if (!p.startDate) continue;
    const start = new Date(p.startDate.replace(/-/g, '/'));
    const end = p.endDate ? new Date(p.endDate.replace(/-/g, '/')) : new Date('9999/12/31');
    if (target >= start && target <= end) return p.hours || 4;
  }
  return null;
}

// 해당 날짜에 휴직 중인지 확인
function isOnLeaveHistory(emp, year, month, day) {
  if (!emp.leaveHistory || !emp.leaveHistory.length) return false;
  const target = new Date(year, month-1, day);
  return emp.leaveHistory.some(l => {
    if (!l.startDate) return false;
    const s = new Date(l.startDate.replace(/-/g, '/'));
    const e = l.endDate ? new Date(l.endDate.replace(/-/g, '/')) : new Date('9999/12/31');
    return target >= s && target <= e;
  });
}

// 현재 휴직 중인지 (오늘 기준)
function isCurrentlyOnLeave(emp) {
  if (!emp.leaveHistory || !emp.leaveHistory.length) return false;
  const today = new Date(); today.setHours(0,0,0,0);
  return emp.leaveHistory.some(l => {
    if (!l.startDate) return false;
    const s = new Date(l.startDate.replace(/-/g, '/'));
    const e = l.endDate ? new Date(l.endDate.replace(/-/g, '/')) : new Date('9999/12/31');
    return today >= s && today <= e;
  });
}

// 직원 상태 반환: 퇴사 / 휴직 / 재직
function getEmpStatus(emp) {
  if (emp.leaveDate && emp.leaveDate <= new Date().toISOString().slice(0,10)) return 'resigned';
  if (isCurrentlyOnLeave(emp)) return 'onleave';
  return 'active';
}
// fromDate: 이 날짜 이후(포함)만 집계. 비례연차 대상자는 2주년 도래일 이후만 집계
function calcUsedInYear(emp, year, fromDate) {
  let annualCount = 0, halfCount = 0;
  let totalHours = 0;
  const empObj = typeof emp === 'object' ? emp : employees.find(e => e.name === emp);

  for (let m = 1; m <= 12; m++) {
    const days = getDaysInMonth(year, m);
    for (let d = 1; d <= days; d++) {
      // fromDate 제한: 해당 날짜가 fromDate 이전이면 스킵
      if (fromDate) {
        const cur = new Date(year, m-1, d);
        if (cur < fromDate) continue;
      }
      const v = getAtt(empObj ? empObj.name : emp, year, m, d);
      if (v === '연차' || v === '반차') {
        const ph = empObj ? getParentalHours(empObj, year, m, d) : null;
        const hrs = ph !== null ? ph : 8;
        if (v === '연차') { annualCount++; totalHours += hrs; }
        else               { halfCount++;  totalHours += hrs / 2; }
      }
    }
  }
  const totalDays = totalHours / 8;
  return { annual: annualCount, half: halfCount, totalHours, totalDays };
}

// 입사일부터 특정 날짜까지 전체 사용 연차 집계 (다년도)
function calcUsedSinceJoin(emp, toDate) {
  const joinDate = new Date((emp.transferDate || emp.joinDate).replace(/-/g, '/'));
  const startYear = joinDate.getFullYear();
  const endYear   = toDate.getFullYear();
  let annualCount = 0, halfCount = 0, totalHours = 0;

  for (let y = startYear; y <= endYear; y++) {
    for (let m = 1; m <= 12; m++) {
      const days = getDaysInMonth(y, m);
      for (let d = 1; d <= days; d++) {
        const cur = new Date(y, m-1, d);
        if (cur < joinDate) continue;
        if (cur > toDate)   break;
        const v = getAtt(emp.name, y, m, d);
        if (v === '연차' || v === '반차') {
          const ph = getParentalHours(emp, y, m, d);
          const hrs = ph !== null ? ph : 8;
          if (v === '연차') { annualCount++; totalHours += hrs; }
          else               { halfCount++;  totalHours += hrs / 2; }
        }
      }
    }
  }
  return { annual: annualCount, half: halfCount, totalHours, totalDays: totalHours / 8 };
}

// 회계연도 발생 연차 계산 (3년차 이상)
// 3~4년차=16, 5~6=17, 7~8=18, 9~10=19, 11~12=20, 13~14=21, 15~16=22, 17~18=23, 19~20=24, 21+= 25
function getAnnualGrantByTenureYear(tenureYears) {
  if (tenureYears < 3) return 15; // fallback
  const base = 16; // 3~4년차
  const extra = Math.floor((tenureYears - 3) / 2); // 2년마다 1개
  return Math.min(25, base + extra);
}

// ── 연차 계산 메인 진입점 ──
// 연도별 소정근로일수 계산 (주말 + 공휴일 제외)
function calcSodingWorkDays(year) {
  let count = 0;
  for (let m = 1; m <= 12; m++) {
    const last = new Date(year, m, 0).getDate();
    for (let d = 1; d <= last; d++) {
      const dow = new Date(year, m-1, d).getDay();
      if (dow === 0 || dow === 6) continue;
      if (isHoliday(year, m, d)) continue;
      count++;
    }
  }
  return count;
}

// 전년도 휴직일수 계산 (결근유형 leaveHistory, 달력일수 기준)
const ABSENT_TYPES = new Set(['결근','병가','병가휴직','가족돌봄','가족돌봄휴직']);
function calcLeaveDaysInYear(emp, year) {
  let total = 0;
  const yearStart = new Date(year, 0, 1);
  const yearEnd   = new Date(year, 11, 31);
  for (const l of (emp.leaveHistory || [])) {
    if (!ABSENT_TYPES.has(l.type)) continue;
    const s  = new Date(l.startDate.replace(/-/g,'/'));
    const e  = l.endDate ? new Date(l.endDate.replace(/-/g,'/')) : new Date('9999/12/31');
    const os = s > yearStart ? s : yearStart;
    const oe = e < yearEnd   ? e : yearEnd;
    if (os <= oe) total += Math.round((oe - os) / 86400000) + 1;
  }
  return total;
}

// 전년도 실출근일 계산 (소정근로일 기준, 내부용)
function calcActualWorkDays(emp, year) {
  let count = 0;
  for (let m = 1; m <= 12; m++) {
    const last = new Date(year, m, 0).getDate();
    for (let d = 1; d <= last; d++) {
      const dow = new Date(year, m-1, d).getDay();
      if (dow === 0 || dow === 6) continue;
      if (isHoliday(year, m, d)) continue;
      const onAbsentLeave = (emp.leaveHistory||[]).some(l => {
        if (!ABSENT_TYPES.has(l.type)) return false;
        const s = new Date(l.startDate.replace(/-/g,'/'));
        const e = l.endDate ? new Date(l.endDate.replace(/-/g,'/')) : new Date('9999/12/31');
        return new Date(year,m-1,d) >= s && new Date(year,m-1,d) <= e;
      });
      if (onAbsentLeave) continue;
      const ym = `${year}_${m}`;
      const raw = attendance[emp.name]?.[ym]?.[String(d)];
      const v = raw && typeof raw === 'object' ? (raw.v||'') : (raw||'');
      if (ABSENT_TYPES.has(v)) continue;
      count++;
    }
  }
  return count;
}


function calcAnnualLeave(emp, year, refDate) {
  if (!emp.joinDate) return null;
  if (emp.team === '실효OB') return calcAnnualLeave_실효OB(emp, year, refDate);
  return calcAnnualLeave_normal(emp, year, refDate);
}

// ── 실효OB 전용 연차 계산 ──
// 공식: ceil(일반발생시간h / 209 * 84)
// 단, 백소라(empId:2690613X → 이름으로 구분)는 수동 92h 고정
function calcAnnualLeave_실효OB(emp, year, refDate) {
  // 먼저 일반 계산으로 일반시간(h) 산출
  const normal = calcAnnualLeave_normal(emp, year, refDate);
  if (!normal) return null;

  // 백소라 수동 고정
  if (emp.name === '백소라') {
    const grantedHours = 92;
    const used = calcUsedInYear(emp, year);
    const usedHours = Math.round(used.totalHours * 10) / 10;
    const remainHours = Math.max(0, grantedHours - usedHours);
    const pct = grantedHours > 0 ? Math.min(100, Math.round(usedHours / grantedHours * 100)) : 0;
    return {
      grantType: '실효OB(수동)', granted: Math.round(grantedHours/8*10)/10,
      isProportional: false,
      usedAnnual: used.annual, usedHalf: used.half,
      usedHours, grantedHours, remainHours: Math.round(remainHours*10)/10,
      totalUsed: Math.round(used.totalHours/8*10)/10,
      remain: Math.round(remainHours/8*10)/10,
      remainLabel: Math.round(remainHours/8*10)/10 + '일',
      isParental: false, curParentalH: null, displayHours: 8, pct
    };
  }

  // 일반발생시간 → 실효OB 시간 변환: ceil(normalH / 209 * 84)
  const normalH = normal.grantedHours;
  const grantedHours = Math.ceil(normalH / 209 * 84);

  const used = calcUsedInYear(emp, year);
  const usedHours = Math.round(used.totalHours * 10) / 10;
  const remainHours = Math.max(0, grantedHours - usedHours);
  const pct = grantedHours > 0 ? Math.min(100, Math.round(usedHours / grantedHours * 100)) : 0;

  return {
    grantType: '실효OB(' + normal.grantType + ')',
    granted: Math.round(grantedHours/8*10)/10,
    isProportional: normal.isProportional,
    usedAnnual: used.annual, usedHalf: used.half,
    usedHours, grantedHours, remainHours: Math.round(remainHours*10)/10,
    totalUsed: Math.round(used.totalHours/8*10)/10,
    remain: Math.round(remainHours/8*10)/10,
    remainLabel: Math.round(remainHours/8*10)/10 + '일',
    isParental: normal.isParental, curParentalH: normal.curParentalH,
    displayHours: 8, pct
  };
}

// 기존 calcAnnualLeave 로직을 내부 함수로 분리 (실효OB가 참조)
function calcAnnualLeave_normal(emp, year, refDate) {
  if (!emp.joinDate) return null;
  const today = refDate ? new Date(refDate) : new Date();
  today.setHours(0,0,0,0);

  // 전보일이 있으면 전보일 기준, 없으면 입사일 기준
  // replace(/-/g, '/') → 로컬 시간 기준 파싱 (UTC 파싱 방지)
  const baseDateStr = emp.transferDate || emp.joinDate;
  const baseDate  = new Date(baseDateStr.replace(/-/g, '/'));
  const joinDate  = baseDate;
  const joinYear  = joinDate.getFullYear();
  const joinMonth = joinDate.getMonth() + 1;
  const joinDay   = joinDate.getDate();

  const baseLabel = emp.transferDate ? '전보일' : '입사일';

  // 1주년: joinDate + 1년
  const anniv1 = new Date(joinDate); anniv1.setFullYear(joinYear + 1);
  // 2주년
  const anniv2 = new Date(joinDate); anniv2.setFullYear(joinYear + 2);

  // 해당 연도 기준일 (1/1 ~ 12/31)
  const yearStart = new Date(year, 0, 1);
  const yearEnd   = new Date(year, 11, 31);

  // 해당 연도 말 기준 근속연수
  const tenureYearsAtYearEnd = year - joinYear;

  let grantType = ''; // 구분 라벨
  let granted = 0;    // 발생 연차 (비례연차는 시간h 단위)
  let isProportional = false; // 비례연차 여부 (granted = 시간h)

  if (tenureYearsAtYearEnd < 1) {
    // ── 1년 미만: 입사일 기준 N개월 후 당일에 연차 발생 ──
    grantType = '월별발생';
    let count = 0;

    for (let i = 1; i <= 11; i++) {
      // 발생일 = 입사일 + i개월
      let gy = joinYear, gm = joinMonth + i, gd = joinDay;
      while (gm > 12) { gm -= 12; gy++; }
      const maxDay = new Date(gy, gm, 0).getDate();
      if (gd > maxDay) gd = maxDay;
      const grantDate = new Date(gy, gm - 1, gd);

      // 발생일이 오늘 이후면 아직 미발생
      if (grantDate > today) break;

      // 만근 체크 구간: 이전 발생일(or 입사일) ~ 이번 발생일 전날
      // 예: 3/20 입사 → 1개월차 구간: 3/20~4/19, 2개월차: 4/20~5/19
      let prevY = joinYear, prevM = joinMonth + (i - 1), prevD = joinDay;
      while (prevM > 12) { prevM -= 12; prevY++; }
      const prevMaxDay = new Date(prevY, prevM, 0).getDate();
      if (prevD > prevMaxDay) prevD = prevMaxDay;
      const rangeStart = new Date(prevY, prevM - 1, prevD); // 구간 시작 (포함)
      const rangeEnd   = new Date(gy,  gm - 1,  gd);        // 구간 끝 = 발생일 (미포함)

      if (!hasAbsentInRange(emp.name, rangeStart, rangeEnd)) count++;
    }
    granted = count;
    grantType = `월별발생 (${count}개 발생)`;

  } else if (tenureYearsAtYearEnd === 1) {
    // ── 1년차: 1주년 도래 여부 먼저 확인 ──
    if (anniv1 > today) {
      // 1주년이 아직 안 됨 → 월별발생 단계
      grantType = '월별발생';
      let count = 0;
      for (let i = 1; i <= 11; i++) {
        let gy = joinYear, gm = joinMonth + i, gd = joinDay;
        while (gm > 12) { gm -= 12; gy++; }
        const maxDay = new Date(gy, gm, 0).getDate();
        if (gd > maxDay) gd = maxDay;
        const grantDate = new Date(gy, gm - 1, gd);
        if (grantDate > today) break;
        // 구간: 이전 발생일 ~ 이번 발생일 전날
        let prevY = joinYear, prevM = joinMonth + (i-1), prevD = joinDay;
        while (prevM > 12) { prevM -= 12; prevY++; }
        const pMax = new Date(prevY, prevM, 0).getDate();
        if (prevD > pMax) prevD = pMax;
        const rangeStart = new Date(prevY, prevM-1, prevD);
        const rangeEnd   = new Date(gy, gm-1, gd);
        if (!hasAbsentInRange(emp.name, rangeStart, rangeEnd)) count++;
      }
      granted = count;
      grantType = `월별발생 (${count}개 발생)`;
    } else {
      // 1주년 도래 완료 → 월별+15 (출근율 80% 미만이면 15개 비례)
      let monthCount = 0;
      for (let i = 1; i <= 11; i++) {
        let gy = joinYear, gm = joinMonth + i, gd = joinDay;
        while (gm > 12) { gm -= 12; gy++; }
        const maxDay = new Date(gy, gm, 0).getDate();
        if (gd > maxDay) gd = maxDay;
        let prevY = joinYear, prevM = joinMonth + (i-1), prevD = joinDay;
        while (prevM > 12) { prevM -= 12; prevY++; }
        const pMax = new Date(prevY, prevM, 0).getDate();
        if (prevD > pMax) prevD = pMax;
        const rangeStart = new Date(prevY, prevM-1, prevD);
        const rangeEnd   = new Date(gy, gm-1, gd);
        if (!hasAbsentInRange(emp.name, rangeStart, rangeEnd)) monthCount++;
      }
      // 1주년 15개 비례 체크 (입사일~1주년 전날 기준)
      const anniv1PeriodStart = new Date(joinDate);
      const anniv1PeriodEnd   = new Date(anniv1); anniv1PeriodEnd.setDate(anniv1PeriodEnd.getDate()-1);
      const anniv1TotalDays   = Math.round((anniv1PeriodEnd - anniv1PeriodStart) / 86400000) + 1;
      const anniv1ActualDays  = calcActualDaysInPeriod(emp, anniv1PeriodStart, anniv1PeriodEnd);
      const anniv1Rate        = anniv1ActualDays / anniv1TotalDays;
      let anniv15 = 15;
      let annivLabel = '';
      if (anniv1Rate < 0.8) {
        anniv15 = Math.ceil(15 * anniv1ActualDays / anniv1TotalDays);
        annivLabel = ` (1주년비례:${anniv1ActualDays}/${anniv1TotalDays}일,${Math.round(anniv1Rate*100)}%)`;
      }
      granted = Math.min(monthCount, 11) + anniv15;
      grantType = `1년차(월별${Math.min(monthCount,11)}+${anniv15})${annivLabel}`;
    }

  } else if (tenureYearsAtYearEnd === 2) {
    // ── 2년차: 2주년 도래 전이면 1년차 발생분 유지, 도래 후 비례연차 ──
    if (anniv2 > yearEnd || anniv2 > today) {
      // 2주년 미도래 → 1년차 발생연차(월별+15) 그대로 표시
      let monthCount = 0;
      for (let i = 1; i <= 11; i++) {
        let gy = joinYear, gm = joinMonth + i, gd = joinDay;
        while (gm > 12) { gm -= 12; gy++; }
        const maxDay = new Date(gy, gm, 0).getDate();
        if (gd > maxDay) gd = maxDay;
        let prevY = joinYear, prevM = joinMonth + (i-1), prevD = joinDay;
        while (prevM > 12) { prevM -= 12; prevY++; }
        const pMax = new Date(prevY, prevM, 0).getDate();
        if (prevD > pMax) prevD = pMax;
        const rangeStart = new Date(prevY, prevM-1, prevD);
        const rangeEnd   = new Date(gy, gm-1, gd);
        if (!hasAbsentInRange(emp.name, rangeStart, rangeEnd)) monthCount++;
      }
      // 1주년 15개 비례 체크
      const anniv1PeriodStart = new Date(joinDate);
      const anniv1PeriodEnd   = new Date(anniv1); anniv1PeriodEnd.setDate(anniv1PeriodEnd.getDate()-1);
      const anniv1TotalDays   = Math.round((anniv1PeriodEnd - anniv1PeriodStart) / 86400000) + 1;
      const anniv1ActualDays  = calcActualDaysInPeriod(emp, anniv1PeriodStart, anniv1PeriodEnd);
      const anniv1Rate        = anniv1ActualDays / anniv1TotalDays;
      let anniv15 = 15;
      let annivLabel = '';
      if (anniv1Rate < 0.8) {
        anniv15 = Math.ceil(15 * anniv1ActualDays / anniv1TotalDays);
        annivLabel = ` (1주년비례:${anniv1ActualDays}/${anniv1TotalDays}일,${Math.round(anniv1Rate*100)}%)`;
      }
      granted = Math.min(monthCount, 11) + anniv15;
      grantType = `1년차(월별${Math.min(monthCount,11)}+${anniv15})${annivLabel}`;
    } else {
      // 2주년 도래 완료 → 비례연차
      // 공식: ceil(15/365 × 남은일수(도래일 당일 포함~12/31) × 8h)
      grantType = '비례연차';
      const yearEnd2 = new Date(year, 11, 31);
      const remainDays = Math.floor((yearEnd2 - anniv2) / 86400000) + 1; // 당일 포함
      const grantedHours = Math.ceil(15 / 365 * remainDays * 8);
      granted = grantedHours;
      isProportional = true;
    }

  } else {
    // ── 3년차 이상: 회계연도 일괄 ──
    const tenureAtYearStart = year - joinYear;
    grantType = `${tenureAtYearStart}년차`;
    const normalGranted = getAnnualGrantByTenureYear(tenureAtYearStart);

    // ── 전년도 출근율 80% 미만 체크 (달력일수 365일 기준) ──
    const prevYear = year - 1;
    const prevYearDays = new Date(prevYear, 11, 31).getDate() === 31 ? 365 : 366; // 윤년 대응
    const prevLeaveDays = calcLeaveDaysInYear(emp, prevYear); // 결근유형 휴직 달력일수
    const prevActualDays = prevYearDays - prevLeaveDays;      // 365 - 휴직일수
    const prevRate = prevActualDays / prevYearDays;

    if (prevRate < 0.8) {
      // 비례연차: ceil(원래연차 × (365-휴직일수) / 365 × 8h)
      const propHours = Math.ceil(normalGranted * prevActualDays / prevYearDays * 8);
      granted = propHours;
      isProportional = true;
      grantType = `${tenureAtYearStart}년차(비례: ${prevActualDays}/${prevYearDays}일, ${Math.round(prevRate*100)}%)`;
    } else {
      granted = normalGranted;
    }
  }

  // 사용량 집계
  // - 2주년 비례연차: 2주년 도래일 이후만
  // - 3년차 이상(회계연도, 출근율 비례 포함): 해당 연도만
  // - 1년차 유지(월별발생 or 1년차): 입사일부터 today까지 전체
  let used;
  const is2ndAnnivProp = isProportional && tenureYearsAtYearEnd === 2;
  if (is2ndAnnivProp) {
    used = calcUsedInYear(emp, year, anniv2);
  } else if (tenureYearsAtYearEnd >= 2 && !(anniv2 > yearEnd || anniv2 > today)) {
    // 3년차 이상 회계연도(출근율 비례 포함): 해당 연도만
    used = calcUsedInYear(emp, year);
  } else {
    // 1년미만 ~ 2주년 미도래: 입사일부터 today까지 전체
    used = calcUsedSinceJoin(emp, today);
  }

  const r1 = v => Math.round(v * 10) / 10; // 소수 1자리 반올림 헬퍼

  // 비례연차는 granted가 이미 시간(h), 나머지는 일수*8
  const grantedHours = isProportional ? granted : granted * 8;
  // 비례연차 표시용 일수 = 시간/8 (소수 1자리)
  const grantedDays = isProportional ? r1(granted / 8) : granted;

  const usedHours   = used.totalHours;
  const remainHours = Math.max(0, grantedHours - usedHours);

  // 육아단축 현재 상태 확인 (기준일 기준)
  const curParentalH = getParentalHours(emp, today.getFullYear(), today.getMonth()+1, today.getDate());
  const isParental   = curParentalH !== null;
  const displayHours = isParental ? curParentalH : 8;

  const remainDays       = r1(displayHours > 0 ? remainHours / displayHours : remainHours / 8);
  const remainHoursDisp  = r1(remainHours);
  const usedHoursDisp    = r1(usedHours);
  const totalUsedDisplay = r1(used.totalHours / 8);
  const pct = grantedHours > 0 ? Math.min(100, Math.round(usedHours / grantedHours * 100)) : 0;

  // 비례연차 grantType에 시간 표시 추가
  const finalGrantType = isProportional && granted > 0
    ? `비례연차 (${granted}h)`
    : grantType;

  return {
    grantType: finalGrantType, granted: grantedDays, isProportional,
    usedAnnual: used.annual, usedHalf: used.half,
    usedHours: usedHoursDisp, grantedHours, remainHours: remainHoursDisp,
    totalUsed: totalUsedDisplay,
    remain: remainDays,
    remainLabel: isParental ? `${remainDays}일 (${curParentalH}h기준)` : `${remainDays}일`,
    isParental, curParentalH, displayHours,
    pct
  };
}

function initLeaveControls() {
  const ysel = document.getElementById('leave-year');
  const now = new Date();
  for (let y = 2023; y <= 2028; y++) {
    const o = document.createElement('option');
    o.value = y; o.textContent = y + '년';
    if (y === now.getFullYear()) o.selected = true;
    ysel.appendChild(o);
  }
  ysel.onchange = renderLeaveTable;

  // 팀 필터
  const teams = getTeams();
  const tsel = document.getElementById('leave-team');
  tsel.innerHTML = '<option value="">전체 팀</option>' + teams.map(t => `<option value="${t}">${t}</option>`).join('');
}

function renderLeaveTable() {
  const yearRaw = document.getElementById('leave-year').value;
  const year = parseInt(yearRaw) || new Date().getFullYear();
  const teamFilter = document.getElementById('leave-team').value;
  const q = document.getElementById('leave-search').value.trim();
  const showResigned = document.getElementById('leave-show-resigned').checked;
  const showSettlement = document.getElementById('leave-show-settlement')?.checked || false;
  const grantTypeFilter = document.getElementById('leave-grant-type')?.value || '';
  const todayStr = new Date().toISOString().slice(0,10);
  const thisYear  = new Date().getFullYear();
  const thisMonth = new Date().getMonth() + 1;

  // grantType 분류 헬퍼
  function classifyGrantType(grantType) {
    if (!grantType) return '';
    const g = grantType;
    if (g.includes('월별발생') && !g.includes('1년차')) return 'monthly'; // 1년미만
    if (g.includes('1년차')) return 'year1';                               // 2년이상(최대26)
    if (g === '비례연차' || g.startsWith('비례연차 (')) return 'prop2';   // 2주년 비례
    if (g.match(/\d+년차/)) return 'fiscal';                              // 회계연도(출근율비례 포함)
    return '';
  }

  // 정산대상자: 이번달에 2주년(기준일+2년)이 도래하는 직원
  function isSettlementTarget(e) {
    const base = e.transferDate || e.joinDate;
    if (!base) return false;
    const baseDate = new Date(base);
    const anniv2Year  = baseDate.getFullYear() + 2;
    const anniv2Month = baseDate.getMonth() + 1; // 입사월과 동일
    return anniv2Year === thisYear && anniv2Month === thisMonth;
  }

  // 이번달 퇴사자 여부
  function isResignedThisMonth(e) {
    if (!e.leaveDate) return false;
    const ldYear  = parseInt(e.leaveDate.slice(0,4));
    const ldMonth = parseInt(e.leaveDate.slice(5,7));
    return ldYear === thisYear && ldMonth === thisMonth;
  }

  let emps = employees.filter(e => {
    const tMatch = !teamFilter || e.team === teamFilter;
    const qMatch = !q || e.name.includes(q);
    const isActuallyResigned = e.leaveDate && e.leaveDate <= todayStr;
    // 퇴사자 포함 체크 안 했어도 이번달 퇴사자는 정산대상자 필터에서 보임
    if (isActuallyResigned && !showResigned && !(showSettlement && isResignedThisMonth(e))) return false;
    if (showSettlement && !isSettlementTarget(e) && !isResignedThisMonth(e)) return false;
    return tMatch && qMatch;
  });

  // 각 직원 연차 계산 (퇴사자는 퇴사일 기준, 재직자는 오늘 기준)
  const rows = emps.map(e => {
    const isActuallyResigned = e.leaveDate && e.leaveDate <= todayStr;
    const refDate = isActuallyResigned ? e.leaveDate : null;
    const isSettlement = isSettlementTarget(e) || isResignedThisMonth(e);
    return { e, lv: calcAnnualLeave(e, year, refDate), isResigned: isActuallyResigned, isSettlement };
  }).filter(r => {
    if (r.lv === null) return false;
    if (!grantTypeFilter) return true;
    return classifyGrantType(r.lv.grantType) === grantTypeFilter;
  });

  // 요약 통계
  const totalGranted = rows.reduce((s, r) => s + (typeof r.lv.granted === 'number' ? r.lv.granted : 0), 0);
  const totalUsed    = rows.reduce((s, r) => s + r.lv.totalUsed, 0);
  const totalRemain  = Math.round(rows.reduce((s, r) => s + (typeof r.lv.remain === 'number' ? r.lv.remain : 0), 0) * 10) / 10;
  const lowRemain    = rows.filter(r => typeof r.lv.remain === 'number' && r.lv.remain <= 3 && r.lv.granted > 0).length;
  const settlementCount = rows.filter(r => r.isSettlement).length;

  document.getElementById('leave-stat-row').innerHTML = [
    { icon: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-2px;flex-shrink:0"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>', label: '대상 직원',      val: rows.length,                                    unit: '명' },
    { icon: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-2px;flex-shrink:0"><circle cx="12" cy="12" r="3"/><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>', label: '총 발생연차',    val: Math.round(totalGranted * 10) / 10,             unit: '일' },
    { icon: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-2px;flex-shrink:0"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>', label: '총 사용연차',    val: Math.round(totalUsed * 10) / 10,                unit: '일' },
    { icon: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-2px;flex-shrink:0"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1"/></svg>', label: '총 잔여연차',    val: totalRemain,                                    unit: '일' },
    { icon: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-2px;flex-shrink:0"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>', label: '잔여 3일 이하',  val: lowRemain,                                      unit: '명' },
    { icon: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-2px;flex-shrink:0"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>', label: '이번달 정산대상', val: settlementCount, unit: '명', highlight: settlementCount > 0 },
  ].map(s => `<div class="stat-card"${s.highlight ? ' style="border-color:#ffd966;background:#fffbe6;"' : ''}>
    <div style="font-size:16px;margin-bottom:2px">${s.icon}</div>
    <div class="stat-val" ${s.highlight ? 'style="color:#996600"' : ''}>${s.val}</div>
    <div class="stat-label">${s.label} <span style="font-size:10px">${s.unit}</span></div>
  </div>`).join('');

  const tbody = document.getElementById('leave-tbody');
  if (!rows.length) { tbody.innerHTML = `<tr><td colspan="13" class="empty-msg">데이터가 없습니다.</td></tr>`; return; }

  const totalPages = Math.max(1, Math.ceil(rows.length / PAGE_SIZE));
  if (leavePage > totalPages) leavePage = 1;
  const leavePageEl = document.getElementById('leave-pages');
  leavePageEl.innerHTML = '';
  for (let p = 1; p <= totalPages; p++) {
    const b = document.createElement('button');
    b.className = 'page-btn' + (p === leavePage ? ' active' : '');
    b.textContent = p;
    b.onclick = () => { leavePage = p; renderLeaveTable(); };
    leavePageEl.appendChild(b);
  }
  const slice = rows.slice((leavePage-1)*PAGE_SIZE, leavePage*PAGE_SIZE);
  const startNo = (leavePage-1)*PAGE_SIZE;

  tbody.innerHTML = slice.map(({ e, lv, isResigned, isSettlement }, i) => {
    const tenure = calcTenure(e);
    const isLow  = typeof lv.remainHours === 'number' && lv.remainHours <= lv.displayHours * 3 && lv.granted > 0;
    const isOver = lv.usedHours > lv.grantedHours;

    const barColor = isOver ? 'var(--danger)' : isLow ? 'var(--warning)' : 'var(--accent)';
    const barPct   = Math.min(100, lv.pct);

    const parentalTag = lv.isParental
      ? `<span class="parental-badge">육아단축 ${lv.curParentalH}h</span>` : '';
    const resignedTag = isResigned
      ? `<span class="badge badge-red" style="font-size:10px;margin-left:4px;">퇴사</span>` : '';

    const baseDate = e.transferDate
      ? `${e.transferDate} <span style="font-size:10px;color:var(--accent);font-weight:600;">(전보)</span>`
      : e.joinDate||'-';

    const remainDisp = lv.isParental
      ? `<div style="font-weight:700;color:${isLow?'var(--danger)':'var(--accent)'};">${lv.remainHours}h</div>
         <div style="font-size:10px;color:var(--text2)">${lv.remain}일 <span style="color:var(--text3)">(${lv.curParentalH}h기준)</span></div>`
      : `<div style="font-weight:700;color:${isLow?'var(--danger)':'var(--accent)'};">${lv.remainHours}h</div>
         <div style="font-size:10px;color:var(--text2)">${lv.remain}일</div>`;

    const settlementTag = isSettlement
      ? `<span class="settlement-badge"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-2px;flex-shrink:0"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> 정산대상</span>` : '';

    const rowBg = isSettlement ? ' class="settlement-row"'
                : isResigned   ? ' style="background:#fafafa;opacity:0.85"'
                : isOver       ? ' style="background:#fff5f0"'
                : lv.isParental ? ' style="background:#f0f6ff"' : '';

    return `<tr${rowBg}>
      <td style="color:var(--text3)">${startNo+i+1}</td>
      <td class="name-col" style="font-weight:700">${e.name}${parentalTag}${resignedTag}${settlementTag}</td>
      <td style="font-size:11px;color:var(--text2);font-family:var(--mono)">${e.empId||'-'}</td>
      <td>${getTeamBadge(e.team,"font-size:10px;")}</td>
      <td style="font-size:11px">${baseDate}</td>
      <td style="text-align:center">${tenure}개월</td>
      <td style="text-align:center"><span class="badge badge-gray" style="font-size:10px">${lv.grantType}</span></td>
      <td style="text-align:center;font-weight:700;color:var(--accent)">${lv.granted}일</td>
      <td style="text-align:center;color:var(--text2)">${lv.grantedHours}h</td>
      <td style="text-align:center"><span class="num">${lv.usedAnnual}일</span></td>
      <td style="text-align:center"><span class="num">${lv.usedHalf}회</span></td>
      <td style="text-align:center;font-weight:700${isOver?';color:var(--danger)':''}">${lv.usedHours}h</td>
      <td style="text-align:center">
        <div style="font-weight:700;color:${isLow?'var(--danger)':isOver?'var(--danger)':'var(--accent)'};">${lv.remainHours}h</div>
        <div style="font-size:11px;color:var(--text2);margin:2px 0;">${lv.isParental?`${lv.remain}일 (${lv.curParentalH}h기준)`:`${lv.remain}일`}</div>
        ${lv.grantedHours > 0 ? `
        <div style="display:flex;align-items:center;gap:4px;justify-content:center;margin-top:3px;">
          <div class="leave-bar" style="width:46px;"><div class="leave-bar-fill" style="width:${barPct}%;background:${barColor}"></div></div>
          <span style="font-size:10px;color:var(--text3)">${lv.pct}%</span>
        </div>` : `<span style="font-size:10px;color:var(--text3);">-</span>`}
      </td>
    </tr>`;
  }).join('');
}

function getAlertBadge(name, year, month) {
  let absent = 0, unpaid = 0;
  const days = getDaysInMonth(year, month);
  for (let d = 1; d <= days; d++) {
    const v = getAtt(name, year, month, d);
    if (v === '결근') absent++;
    if (v === '무급휴가') unpaid++;
  }
  let html = '';
  if (absent >= 2) html += `<span class="alert-badge" title="${month}월 결근 ${absent}일">결근 ${absent}</span>`;
  if (unpaid >= 3) html += `<span class="warn-badge" title="${month}월 무급 ${unpaid}일">무급 ${unpaid}</span>`;
  return html;
}

let dayBulkTarget = { year: 0, month: 0, day: 0 };
let dayBulkEntries = []; // [{name, type}]

function openDayBulkModal(year, month, day) {
  if (!isAdminMode()) return;
  dayBulkTarget = { year, month, day };
  dayBulkEntries = [];

  const dow = new Date(year, month-1, day).getDay();
  const dayNames = ['일','월','화','수','목','금','토'];
  const hol = isHoliday(year, month, day);

  document.getElementById('day-bulk-title').textContent = `${year}년 ${month}월 ${day}일 (${dayNames[dow]}) 일괄변경`;
  document.getElementById('day-bulk-info').innerHTML =
    `${hol ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-2px;flex-shrink:0"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg> 공휴일 · ' : ''}이름을 검색해서 추가하고 근태를 선택하세요.`;

  // 기존 근태가 기본값이 아닌 직원 자동 불러오기
  const days = getDaysInMonth(year, month);
  const preloaded = employees.filter(e => {
    if (e.leaveDate) {
      const ld = new Date(e.leaveDate.replace(/-/g,'/'));
      if (new Date(year, month-1, day) > ld) return false;
    }
    if (e.joinDate) {
      const jd = new Date(e.joinDate.replace(/-/g,'/'));
      if (new Date(year, month-1, day) < jd) return false;
    }
    const v = getAtt(e.name, year, month, day);
    const def = getDefaultAtt(year, month, day);
    return v !== def;
  });
  dayBulkEntries = preloaded.map(e => ({
    name: e.name,
    type: getAtt(e.name, year, month, day),
    memo: getAttMemo(e.name, year, month, day),
  }));

  document.getElementById('day-bulk-search').value = '';
  document.getElementById('day-bulk-dropdown').style.display = 'none';
  renderDayBulkList();
  document.getElementById('day-bulk-modal').classList.add('show');
}

function dayBulkSearchKeydown(e) {
  if (e.key === 'Enter') {
    const dd = document.getElementById('day-bulk-dropdown');
    // 드롭다운에 항목이 있으면 첫 번째 항목 선택
    if (dd && dd.style.display !== 'none') {
      const first = dd.querySelector('div');
      if (first) {
        first.click();
        return;
      }
    }
    // 드롭다운 없으면 그냥 추가 시도
    dayBulkAddEmp();
  }
}

function dayBulkSearch() {
  const q = document.getElementById('day-bulk-search').value.trim();
  const dd = document.getElementById('day-bulk-dropdown');
  if (!q) { dd.style.display = 'none'; return; }

  const matched = employees.filter(e =>
    (e.name.includes(q) || e.empId.includes(q)) &&
    !dayBulkEntries.find(x => x.name === e.name)
  ).slice(0, 10);

  if (!matched.length) { dd.style.display = 'none'; return; }

  dd.innerHTML = matched.map(e => `
    <div onclick="dayBulkSelectEmp('${e.name}')"
      style="padding:8px 12px;cursor:pointer;font-size:12px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;"
      onmouseover="this.style.background='var(--surface2)'" onmouseout="this.style.background=''">
      <span><strong>${e.name}</strong> <span style="color:var(--text3);font-size:11px">${e.empId}</span></span>
      <span style="font-size:11px;color:var(--text2)">${e.team}</span>
    </div>`).join('');
  dd.style.display = 'block';
}

function dayBulkSelectEmp(name) {
  document.getElementById('day-bulk-search').value = name;
  document.getElementById('day-bulk-dropdown').style.display = 'none';
}

function dayBulkAddEmp() {
  const name = document.getElementById('day-bulk-search').value.trim();
  const type = document.getElementById('day-bulk-att-type').value;

  if (!name) { showToast('이름을 입력하세요.', true); return; }
  const emp = employees.find(e => e.name === name);
  if (!emp) { showToast(`"${name}" 직원을 찾을 수 없습니다.`, true); return; }
  if (dayBulkEntries.find(x => x.name === name)) {
    // 이미 있으면 근태만 업데이트
    dayBulkEntries.find(x => x.name === name).type = type;
    showToast(`${name} 근태 업데이트됨`);
  } else {
    dayBulkEntries.push({ name, type, memo: '' });
  }
  document.getElementById('day-bulk-search').value = '';
  renderDayBulkList();
}

function renderDayBulkList() {
  const list = document.getElementById('day-bulk-list');
  const cnt  = document.getElementById('day-bulk-count');
  cnt.textContent = `(${dayBulkEntries.length}명)`;

  if (!dayBulkEntries.length) {
    list.innerHTML = `<div style="font-size:12px;color:var(--text3);padding:10px 0;text-align:center;">추가된 직원이 없습니다.</div>`;
    return;
  }

  list.innerHTML = dayBulkEntries.map((entry, i) => {
    const emp = employees.find(e => e.name === entry.name);
    const cls = ATT_CLASS[entry.type] || 'att-미입력';
    return `<div style="display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;">
      <span style="font-weight:700;font-size:13px;min-width:60px;">${entry.name}</span>
      <span style="font-size:11px;color:var(--text2);">${emp?.team||''}</span>
      <span style="flex:1;"></span>
      <select class="form-select" style="width:110px;font-size:12px;" onchange="dayBulkUpdateType(${i},this.value)">
        ${['연차','반차','○','공휴일','휴무','휴일','결근','청휴','병가','무급휴가','보건','가족돌봄','공가','유급','배우자출산'].map(t =>
          `<option value="${t}" ${t===entry.type?'selected':''}>${t==='○'?'● 출근':t}</option>`
        ).join('')}
      </select>
      <input class="form-input" placeholder="메모(선택)" value="${entry.memo||''}"
        style="width:120px;font-size:11px;" onchange="dayBulkUpdateMemo(${i},this.value)">
      <button class="btn btn-sm btn-danger" onclick="dayBulkRemove(${i})">✕</button>
    </div>`;
  }).join('');
}

function dayBulkUpdateType(i, val) {
  dayBulkEntries[i].type = val;
}
function dayBulkUpdateMemo(i, val) {
  dayBulkEntries[i].memo = val;
}
function dayBulkRemove(i) {
  dayBulkEntries.splice(i, 1);
  renderDayBulkList();
}

function saveDayBulk() {
  const { year, month, day } = dayBulkTarget;
  if (!dayBulkEntries.length) { showToast('변경할 직원이 없습니다.', true); return; }

  const blocked = [];
  dayBulkEntries.forEach(entry => {
    if (entry.type === '연차' || entry.type === '반차') {
      const emp = employees.find(e => e.name === entry.name);
      if (emp) {
        const lv = calcAnnualLeave(emp, new Date().getFullYear());
        if (lv) {
          const ph = getParentalHours(emp, year, month, day);
          const hrsPerDay = ph !== null ? ph : 8;
          const prevVal = getAtt(entry.name, year, month, day);
          const prevHrs = prevVal === '연차' ? hrsPerDay : prevVal === '반차' ? hrsPerDay / 2 : 0;
          const needHrs = entry.type === '연차' ? hrsPerDay : hrsPerDay / 2;
          const availHrs = lv.remainHours + prevHrs;
          if (needHrs > availHrs) {
            blocked.push(`${entry.name}(잔여 ${availHrs}h)`);
            return;
          }
        }
      }
    }
    setAtt(entry.name, year, month, day, entry.type, entry.memo);
    if (entry.type === '결근') applyAbsenceRules(entry.name, year, month, day, true);
  });

  closeModal('day-bulk-modal');
  renderAttTable();
  autoSave();
  if (blocked.length) {
    showToast(`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-2px;flex-shrink:0"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg> 잔여연차 부족으로 제외: ${blocked.join(', ')}`, true);
  } else {
    showToast(`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-2px;flex-shrink:0"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg> ${dayBulkEntries.length}명 ${month}월 ${day}일 근태 저장완료`);
  }
}

    showToast('<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-2px;flex-shrink:0"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg> HTML 저장 실패: ' + err.message, true);

function loadNotice() {
  try {
    const raw = localStorage.getItem('att_notice');
    if (!raw) return;
    const notice = JSON.parse(raw);
    if (!notice.active) return;
    const todayStr = new Date().toISOString().slice(0,10);
    const hideUntil = localStorage.getItem('att_notice_hide');
    if (hideUntil === todayStr) return;
    document.getElementById('notice-title').innerHTML = notice.title || '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-2px;flex-shrink:0"><path d="M22 4L12 14.01l-3-3"/><path d="M3 8.67v9.45a2 2 0 0 0 2.4 1.96l12-3A2 2 0 0 0 19 15V9.67a2 2 0 0 0-1.6-1.96l-12-3A2 2 0 0 0 3 6.71v1.96"/></svg> 공지사항';
    document.getElementById('notice-body').textContent = notice.body || '';
    document.getElementById('notice-date').textContent = notice.date || '';
    document.getElementById('notice-no-show').checked = false;
    document.getElementById('notice-modal').classList.add('show');
  } catch(e) {}
}

function closeNotice() {
  const noShow = document.getElementById('notice-no-show').checked;
  if (noShow) {
    const todayStr = new Date().toISOString().slice(0,10);
    try { localStorage.setItem('att_notice_hide', todayStr); } catch(e) {}
  }
  closeModal('notice-modal');
}

function openNoticeEdit() {
  try {
    const raw = localStorage.getItem('att_notice');
    const notice = raw ? JSON.parse(raw) : { title:'', body:'', active:false };
    document.getElementById('notice-edit-title').value    = notice.title || '';
    document.getElementById('notice-edit-body').value     = notice.body  || '';
    document.getElementById('notice-edit-active').checked = !!notice.active;
  } catch(e) {
    document.getElementById('notice-edit-title').value    = '';
    document.getElementById('notice-edit-body').value     = '';
    document.getElementById('notice-edit-active').checked = false;
  }
  document.getElementById('notice-edit-modal').classList.add('show');
}

function saveNotice() {
  const title  = document.getElementById('notice-edit-title').value.trim();
  const body   = document.getElementById('notice-edit-body').value.trim();
  const active = document.getElementById('notice-edit-active').checked;
  const date   = new Date().toLocaleDateString('ko-KR');
  try {
    localStorage.setItem('att_notice', JSON.stringify({ title, body, active, date }));
    // 저장 시 오늘 숨김 해제 (수정 후 바로 보이게)
    localStorage.removeItem('att_notice_hide');
  } catch(e) {}
  closeModal('notice-edit-modal');
  showToast(active ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-2px;flex-shrink:0"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg> 공지사항이 저장되었습니다. 다음 실행 시 팝업이 표시됩니다.' : '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-2px;flex-shrink:0"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg> 공지사항이 저장되었습니다. (팝업 비활성화)');
}
let _issueMemoTimer = null;
function getIssueMemoKey(year, month) {
  return `issue_memo_${year}_${month}`;
}

function toggleIssueSection(id) {
  const body  = document.getElementById(id);
  const arrow = document.getElementById(id + '-arrow');
  if (!body) return;
  const isOpen = body.style.display !== 'none';
  body.style.display = isOpen ? 'none' : 'block';
  if (arrow) arrow.style.transform = isOpen ? 'rotate(-90deg)' : 'rotate(0deg)';
}
