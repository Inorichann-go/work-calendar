<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>직원 근태관리 시스템 (월~금 5일제)</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&amp;family=JetBrains+Mono:wght@400;600&amp;display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #eef1f6;
    --surface: #ffffff;
    --surface2: #f5f7fa;
    --surface3: #e8ecf2;
    --border: #dde3ed;
    --border2: #c5cfe0;
    --accent: #2563eb;
    --accent-hover: #1d4ed8;
    --accent-light: #eff4ff;
    --success: #16a34a;
    --warning: #d97706;
    --danger: #dc2626;
    --text: #1e293b;
    --text2: #475569;
    --text3: #94a3b8;
    --font: 'Noto Sans KR', sans-serif;
    --mono: 'JetBrains Mono', monospace;
    --shadow: 0 2px 12px rgba(30,41,59,.08);
    --shadow-md: 0 6px 28px rgba(30,41,59,.14);
}

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 13px;
  }

  /* ── 헤더 ── */
  header {
    background: #ffffff;
    border-bottom: 2px solid #e2e8f0;
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 58px;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 1px 4px rgba(30,41,59,.06);
  }
  .logo {
    font-size: 16px; font-weight: 700; letter-spacing: -0.3px;
    display: flex; align-items: center; gap: 8px;
    color: #1e293b;
  }
  .logo-icon {
    width: 30px; height: 30px;
    background: linear-gradient(135deg, #f7b8cc, var(--accent));
    border-radius: 8px; display: flex; align-items: center; justify-content: center;
    font-size: 15px; box-shadow: 0 3px 8px rgba(37,99,235,.28);
  }
  .header-right { display: flex; align-items: center; gap: 10px; }

  /* ── 저장 버튼 ── */
  .btn-save {
    background: linear-gradient(135deg, #f080a0, var(--accent));
    color: #fff; border: none; border-radius: 9px;
    padding: 8px 18px; font-size: 13px; font-weight: 700;
    cursor: pointer; display: flex; align-items: center; gap: 6px;
    box-shadow: 0 3px 10px rgba(37,99,235,.32);
    transition: all 0.18s;
  }
  .btn-save:hover { background: linear-gradient(135deg, #2563eb, var(--accent-hover)); transform: translateY(-1px); box-shadow: 0 5px 16px rgba(37,99,235,.4); }
  .btn { background: var(--surface2); color: var(--text2); border: 1.5px solid var(--border); border-radius: 8px; padding: 7px 14px; font-size: 13px; cursor: pointer; transition: all 0.15s; font-family: var(--font); }
  .btn:hover { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }
  .btn-danger { background: #fff0f0; color: var(--danger); border: 1.5px solid #ffcccc; border-radius: 8px; padding: 4px 10px; font-size: 12px; cursor: pointer; }
  .btn-danger:hover { background: var(--danger); color: #fff; }
  .btn-sm { padding: 4px 10px; font-size: 12px; }

  /* ── 탭 ── */
  .tabs {
    display: flex; gap: 0;
    background: #1e293b;
    border-bottom: none;
    padding: 0 24px;
    box-shadow: 0 2px 8px rgba(30,41,59,.18);
    position: sticky;
    top: 58px;
    z-index: 20;
  }
  .tab {
    padding: 13px 20px; font-size: 13px; font-weight: 600;
    color: rgba(255,255,255,.55); cursor: pointer;
    border-bottom: 3px solid transparent; margin-bottom: 0;
    transition: all 0.15s; white-space: nowrap;
  }
  .tab:hover { color: rgba(255,255,255,.9); background: rgba(255,255,255,.07); }
  .tab.active { color: #ffffff; border-bottom-color: #60a5fa; background: rgba(255,255,255,.1); }

  /* ── 패널 ── */
  .panel { display: none; padding: 24px; }
  .panel.active { display: block; }

  /* ── 정렬 아이콘 ── */
  .sortable { cursor: pointer; user-select: none; }
  .sortable:hover { background: var(--surface3) !important; color: var(--accent) !important; }
  .sort-icon { font-size: 10px; opacity: 0.5; margin-left: 2px; }
  .sort-icon.asc::after { content: ' ▲'; }
  .sort-icon.desc::after { content: ' ▼'; }
  .sort-icon.asc, .sort-icon.desc { opacity: 1; color: var(--accent); }

  /* ── 리셋/경고 버튼 ── */
  .btn-reset { background: var(--surface2); color: var(--text3); border: 1.5px solid var(--border); border-radius: 8px; padding: 7px 13px; font-size: 13px; cursor: pointer; transition: all .15s; font-family: var(--font); }
  .btn-reset:hover { background: #fff3d0; border-color: var(--warning); color: #996600; }
  .btn-warn { background: #fff0f0; color: var(--danger); border: 1.5px solid #ffcccc; border-radius: 8px; padding: 7px 13px; font-size: 13px; cursor: pointer; font-family: var(--font); transition: all .15s; }
  .btn-warn:hover { background: var(--danger); color: #fff; }
  .btn-add { background: linear-gradient(135deg, #ffc8d8, var(--accent-light)); color: var(--accent); border: 1.5px solid var(--border2); border-radius: 9px; padding: 8px 16px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all .15s; }
  .btn-add:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* ── B안 일괄변경 달력 셀 ── */
  .bulk-cal-head { text-align:center; font-size:10px; font-weight:700; color:var(--text3); padding:4px 0; }
  .bulk-cal-cell {
    border: 1.5px solid var(--border); border-radius: 8px;
    padding: 5px 3px; text-align: center; cursor: pointer;
    transition: all .1s; min-height: 54px;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
  }
  .bulk-cal-cell:hover { border-color: var(--accent); background: var(--accent-light) !important; }
  .bulk-cal-cell.selected { border-color: var(--accent) !important; background: var(--accent) !important; }
  .bulk-cal-cell.selected .bcn, .bulk-cal-cell.selected .bcd, .bulk-cal-cell.selected .bcv { color: #fff !important; }
  .bulk-cal-cell.bcc-hol { background: #fffae8; }
  .bulk-cal-cell.bcc-off { background: #f5f8ff; }
  .bcn { font-size: 12px; font-weight: 700; }
  .bcd { font-size: 9px; color: var(--text3); }
  .bcv { font-size: 10px; font-weight: 700; border-radius: 3px; padding: 1px 3px; margin-top: 1px; }

  /* ── 카드 ── */
  .card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    overflow: visible;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
  }
  .card-header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    background: var(--surface2);
  }
  .card-title { font-weight: 600; font-size: 13px; color: var(--accent); }
  .card-body { padding: 18px; }

  /* ── 폼 ── */
  .form-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-label { font-size: 11px; color: var(--text2); font-weight: 600; }
  .form-input, .form-select {
    background: var(--surface2); border: 1.5px solid var(--border);
    color: var(--text); border-radius: 8px; padding: 8px 12px;
    font-size: 13px; font-family: var(--font);
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .form-input:focus, .form-select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,.12); }
  .form-select option { background: var(--surface); color: var(--text); }

  /* ── 직원목록 테이블 ── */
  .emp-table-wrap { overflow-x: auto; }
  /* 테이블 헤더 고정 */
  .emp-table-wrap,
  .att-grid-wrap {
    overflow-x: auto;
    overflow-y: auto;
    max-height: calc(100vh - 220px);
    border-radius: 12px;
  }
  .emp-table-wrap table thead th,
  .att-grid-wrap table thead th,
  .att-grid-wrap table thead td,
  .summary-table thead th {
    position: sticky;
    top: 0;
    z-index: 3;
    background: var(--surface2);
    box-shadow: 0 1px 0 var(--border);
  }
  /* 월별요약 합계행: 첫번째 헤더행 바로 아래 고정 */
  .summary-table thead tr:nth-child(1) th { top: 0; z-index: 4; height: 44px; }
  .summary-table thead tr:nth-child(2) th {
    position: sticky;
    top: 44px;
    z-index: 3;
    background: var(--accent-light) !important;
    font-weight: 700;
    font-size: 11px;
    box-shadow: 0 1px 0 var(--border);
  }
  .att-grid-wrap table thead tr:nth-child(1) th { top: 0; }
  .att-grid-wrap table thead tr:nth-child(2) td,
  .att-grid-wrap table thead tr:nth-child(2) th {
    top: 44px; z-index: 2; position: sticky; background: var(--surface2);
  }
  /* ctrl-bar 고정 해제 (sticky 제거) */
  .ctrl-bar {
    background: var(--bg);
    padding-bottom: 10px;
  }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th {
    background: var(--surface2); color: var(--text2);
    padding: 10px 10px; text-align: left; font-weight: 700;
    border-bottom: 2px solid var(--border); white-space: nowrap;
    font-size: 11px; letter-spacing: 0.3px;
  }
  td {
    padding: 8px 10px; border-bottom: 1px solid var(--border);
    color: var(--text); white-space: nowrap;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--surface2); }
  .action-btns { display: flex; gap: 6px; }

  /* ── 배지 ── */
  .badge {
    display: inline-block; padding: 2px 9px; border-radius: 20px;
    font-size: 11px; font-weight: 700;
  }
  .badge-blue { background: var(--accent-light); color: var(--accent); }
  .badge-green { background: #d8f5ec; color: #2a9a6e; }
  .badge-yellow { background: #fff3d0; color: #996600; }
  .badge-red { background: #ffe8e8; color: var(--danger); }
  .badge-purple { background: #f0e8ff; color: #7040c0; }
  .badge-gray { background: var(--surface3); color: var(--text3); }

  /* ── 근태 셀 ── */
  .att-cell {
    display: inline-block; text-align: center;
    padding: 2px 1px; border-radius: 4px; font-size: 10px;
    cursor: pointer; width: 30px; font-weight: 600;
    overflow: hidden; white-space: nowrap;
    transition: transform 0.1s, opacity 0.1s;
    vertical-align: middle;
  }
  .att-cell:hover { transform: scale(1.15); opacity: 0.8; }
  .att-휴직 { background: #fff0e0; color: #cc6000; font-size: 9px !important; }
  .att-출근   { color: #94a3b8; }
  .att-연차   { background: #dceeff; color: #3070cc; }
  .att-반차   { background: #e8f3ff; color: #5090dd; }
  .att-공휴일 { background: #fff3cc; color: #996600; font-weight: 700; }
  .att-휴무   { background: #f5eef2; color: var(--text3); }
  .att-휴일   { background: #fde8ef; color: #3b82f6; }
  .att-결근   { background: #ffe0e0; color: var(--danger); font-weight: 700; }
  .att-청휴   { background: #f0e8ff; color: #7040c0; }
  .att-병가   { background: #ffe8f0; color: #1d4ed8; }
  .att-무급휴가 { background: #fff0e0; color: #cc6800; }
  .att-보건   { background: #e0f0ff; color: #3870cc; }
  .att-가족돌봄 { background: #e8ffe8; color: #2a8a40; }
  .att-공가   { background: #e0fff8; color: #1a8870; }
  .att-유급   { background: #e8ffe0; color: #30a020; }
  .att-배우자출산 { background: #ffe8f8; color: #aa30aa; }
  .att-교육 { background: #e8f4ff; color: #1a6fb5; }
  .att-미입력 { color: var(--text3); font-weight: 400; }
  .att-빈칸   { color: var(--border); }

  /* ── 근태 그리드 ── */
  .att-grid-wrap { overflow-x: auto; }
  .att-grid { border-collapse: collapse; }
  .att-grid th, .att-grid td {
    border: 1px solid var(--border); padding: 5px 4px;
    text-align: center; white-space: nowrap; font-size: 11px;
  }
  .att-grid th { background: var(--surface2); color: var(--text2); font-weight: 700; padding: 8px 5px; }
  .att-grid .emp-name { text-align: left; padding-left: 10px; font-weight: 600; min-width: 72px; }
  .att-grid .emp-team { color: var(--text3); font-size: 10px; }
  .att-grid tr:hover td { background: #fff5f8; }
  .day-col { min-width: 34px; max-width: 34px; width: 34px; }
  .day-col-clickable { cursor: pointer; }
  .day-col-clickable:hover { background: var(--accent-light) !important; color: var(--accent) !important; }
  .day-sun { color: var(--danger) !important; background: #fff5f5 !important; }
  .day-sat { color: #4080cc !important; background: #f5f8ff !important; }
  .day-hol { background: #fffae8 !important; }
  .summary-col { background: var(--surface2) !important; font-weight: 700; color: var(--text2) !important; }
  .summary-head { background: var(--accent-light) !important; color: var(--accent) !important; }

  /* ── 월별 요약 ── */
  .summary-table th, .summary-table td { padding: 7px 10px; text-align: center; }
  .summary-table .name-col { text-align: left; min-width: 80px; }
  .num { font-family: var(--mono); font-size: 12px; }
  .num-0 { color: var(--text3); }

  /* ── 입력 팝업 ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(56,20,40,0.35); z-index: 1000;
    align-items: center; justify-content: center;
    backdrop-filter: blur(3px);
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--surface); border: 2px solid var(--border);
    border-radius: 16px; width: 360px; max-width: 96vw; padding: 24px;
    box-shadow: var(--shadow-md);
    animation: modalPop 0.18s ease;
  }
  @keyframes modalPop { from { transform:scale(.94) translateY(6px); opacity:0; } to { transform:scale(1) translateY(0); opacity:1; } }
  .modal h3 { font-size: 14px; font-weight: 700; margin-bottom: 16px; color: var(--accent); }
  .modal-btns { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }

  /* ── 컨트롤바 ── */
  .ctrl-bar {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    margin-bottom: 16px;
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 12px; padding: 12px 16px;
    box-shadow: var(--shadow);
  }
  .ctrl-bar .form-select, .ctrl-bar .form-input {
    width: auto; min-width: 120px;
  }

  /* ── 토스트 ── */
  #toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--success); color: #fff;
    padding: 12px 20px; border-radius: 10px; font-size: 13px; font-weight: 700;
    opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 9999;
    box-shadow: 0 4px 20px rgba(61,186,140,.4);
  }
  #toast.show { opacity: 1; }

  /* ── 통계 카드 ── */
  .stat-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
  .stat-card {
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 12px; padding: 14px 18px; flex: 1; min-width: 100px;
    box-shadow: var(--shadow); position: relative; overflow: hidden;
  }
  .stat-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--accent-light), var(--accent));
  }
  .stat-val { font-size: 22px; font-weight: 700; font-family: var(--mono); color: var(--accent); }
  .stat-label { font-size: 11px; color: var(--text2); margin-top: 2px; font-weight: 500; }
  .empty-msg { text-align: center; padding: 48px 20px; color: var(--text3); }

  .filter-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }

  /* 스크롤바 */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--surface2); border-radius: 3px; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

  .select-type-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 12px;
  }
  .type-btn {
    background: var(--surface2); border: 1.5px solid var(--border);
    color: var(--text2); border-radius: 7px; padding: 6px 4px;
    font-size: 11px; font-weight: 600; cursor: pointer; text-align: center; transition: all 0.15s;
    font-family: var(--font);
  }
  .type-btn:hover { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }
  .type-btn.sel { background: var(--accent); color: #fff; border-color: var(--accent); box-shadow: 0 2px 8px rgba(37,99,235,.3); }

  .pagination { display: flex; gap: 4px; align-items: center; margin-top: 12px; justify-content: center; flex-wrap: wrap; }
  .page-btn { background: var(--surface); border: 1.5px solid var(--border); color: var(--text2); border-radius: 7px; padding: 5px 10px; font-size: 12px; cursor: pointer; transition: all 0.15s; }
  .page-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .page-btn:hover:not(.active) { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }

  /* 월별 요약 */
  .summary-table th, .summary-table td { padding: 7px 10px; text-align: center; }
  .summary-table .name-col { text-align: left; min-width: 80px; }
  .num { font-family: var(--mono); font-size: 12px; font-weight: 600; }
  .num-0 { color: var(--text3); font-weight: 400; }

  /* 연간 달력 */
  .annual-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  @media(max-width:900px){ .annual-grid { grid-template-columns: repeat(2,1fr); } }
  .month-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: 12px; overflow: hidden; box-shadow: var(--shadow); }
  .month-card-head { background: var(--surface2); padding: 8px 12px; font-weight: 700; font-size: 13px; color: var(--accent); border-bottom: 1px solid var(--border); }
  .month-mini { display: grid; grid-template-columns: repeat(7,1fr); gap: 2px; padding: 8px; }
  .mmc-head { text-align: center; font-size: 9px; font-weight: 700; color: var(--text3); padding: 2px 0; }
  .mmc { text-align: center; font-size: 10px; border-radius: 4px; padding: 3px 1px; min-height: 32px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1px; }
  .mmc-num { font-size: 10px; font-weight: 600; }
  .mmc-val { font-size: 8px; font-weight: 700; border-radius: 2px; padding: 0 2px; }
  .mmc-hol { background: #fffae8; }
  .mmc-off { background: #f5f8ff; }

  /* 이상 근태 경고 뱃지 */
  .alert-badge { display: inline-block; background: #ffe0e0; color: var(--danger); border-radius: 6px; padding: 2px 7px; font-size: 10px; font-weight: 700; margin-left: 4px; }
  .warn-badge  { display: inline-block; background: #fff3d0; color: #996600; border-radius: 6px; padding: 2px 7px; font-size: 10px; font-weight: 700; margin-left: 4px; }

  /* 메모 */
  .memo-cell { max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 11px; color: var(--text2); cursor: help; }

  /* 근태 메모 핀 표시 */
  .att-memo-pin {
    position: absolute; top: 0; right: 0;
    width: 0; height: 0;
    border-style: solid;
    border-width: 0 7px 7px 0;
    border-color: transparent var(--accent) transparent transparent;
  }
  .att-cell-wrap {
    position: relative; display: inline-block;
  }
  .att-memo-tooltip {
    display: none; position: absolute; bottom: 130%; left: 50%;
    transform: translateX(-50%);
    background: #1e293b; color: #fff; font-size: 11px; font-weight: 400;
    padding: 6px 10px; border-radius: 7px;
    white-space: nowrap;
    z-index: 200; pointer-events: none;
    line-height: 1.5;
    box-shadow: 0 3px 10px rgba(0,0,0,.35);
  }
  .att-memo-tooltip::after {
    content: ''; position: absolute; top: 100%; left: 50%;
    transform: translateX(-50%);
    border: 5px solid transparent;
    border-top-color: #1e293b;
  }
  .att-cell-wrap:hover .att-memo-tooltip { display: block; }

  /* 육아기 단축근무 뱃지 */
  .parental-badge { display: inline-block; background: #e8f4ff; color: #3a78cc; border-radius: 6px; padding: 2px 7px; font-size: 10px; font-weight: 700; margin-left: 4px; }

  /* 육아기 단축근무 이력 UI */
  .parental-list { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }
  .parental-row { display: grid; grid-template-columns: 1fr 1fr auto auto; gap: 6px; align-items: center; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; }
  .parental-row input, .parental-row select { font-size: 12px; padding: 5px 8px; border: 1px solid var(--border); border-radius: 6px; background: var(--surface); color: var(--text); font-family: var(--font); }
  .parental-row .p-label { font-size: 10px; color: var(--text3); }

  /* 휴직 배지 */
  .badge-orange { background: #fff0e0; color: #cc6000; }
  .leave-badge { display: inline-block; background: #fff0e0; color: #cc6000; border-radius: 6px; padding: 2px 7px; font-size: 10px; font-weight: 700; margin-left: 4px; }

  /* 정산대상자 하이라이트 */
  .settlement-row td { background: #fffbe6 !important; }
  .settlement-badge { display: inline-block; background: #fff3cd; color: #996600; border-radius: 6px; padding: 2px 7px; font-size: 10px; font-weight: 700; margin-left: 4px; border: 1px solid #ffd966; }
  .team-color-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .team-color-row:last-child { border-bottom: none; }
  .team-color-name { flex: 1; font-size: 13px; font-weight: 600; color: var(--text); }
  .color-preset-row { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; }
  .color-dot { width: 22px; height: 22px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: transform .15s, border-color .15s; flex-shrink: 0; }
  .color-dot:hover { transform: scale(1.2); }
  .color-dot.selected { border-color: #1e293b; transform: scale(1.1); box-shadow: 0 0 0 2px #fff, 0 0 0 4px #1e293b; }
  .color-dot-custom { width: 22px; height: 22px; border-radius: 50%; overflow: hidden; border: 2px solid var(--border); cursor: pointer; position: relative; }
  .color-dot-custom input[type=color] { position: absolute; top: -4px; left: -4px; width: 130%; height: 130%; cursor: pointer; border: none; padding: 0; }

  /* 잔여연차 바 */
  .leave-bar-wrap { display: flex; align-items: center; gap: 6px; min-width: 80px; }
  .leave-bar { height: 6px; border-radius: 3px; background: var(--border); flex: 1; overflow: hidden; }
  .leave-bar-fill { height: 100%; border-radius: 3px; background: var(--accent); transition: width .3s; }
  .leave-num { font-size: 11px; font-weight: 700; color: var(--accent); white-space: nowrap; }
  .leave-num.low { color: var(--danger); }

  /* 팀별 차트 */
  .chart-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: 14px; padding: 20px; box-shadow: var(--shadow); }
  .chart-title { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 16px; }
  .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .bar-label { width: 100px; font-size: 12px; color: var(--text2); text-align: right; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bar-track { flex: 1; height: 22px; background: var(--surface2); border-radius: 6px; overflow: hidden; position: relative; }
  .bar-fill { height: 100%; border-radius: 6px; display: flex; align-items: center; padding-left: 8px; font-size: 11px; font-weight: 700; color: #fff; transition: width .4s ease; white-space: nowrap; }
  .bar-val { font-size: 12px; font-weight: 700; color: var(--text2); min-width: 36px; text-align: right; }
  .donut-wrap { display: flex; gap: 24px; align-items: center; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text2); }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  /* 인쇄 */
  /* ── Summary 대시보드 ── */
  .dash-kpi-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 20px; }
  @media(max-width:900px){ .dash-kpi-row { grid-template-columns: repeat(3,1fr); } }
  .kpi-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: 14px; padding: 16px 18px; box-shadow: var(--shadow); position: relative; overflow: hidden; }
  .kpi-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; }
  .kpi-card.kpi-total::before  { background: linear-gradient(90deg,#f9a8ba,var(--accent)); }
  .kpi-card.kpi-active::before { background: linear-gradient(90deg,#a8f0d0,#3dba8c); }
  .kpi-card.kpi-join::before   { background: linear-gradient(90deg,#a8c8ff,#3a78cc); }
  .kpi-card.kpi-leave::before  { background: linear-gradient(90deg,#ffb8b8,#e04040); }
  .kpi-card.kpi-short::before  { background: linear-gradient(90deg,#c8e8ff,#5090dd); }
  .kpi-card.kpi-avg::before    { background: linear-gradient(90deg,#ffe0a8,#cc8800); }
  .kpi-icon { font-size: 22px; margin-bottom: 6px; }
  .kpi-val { font-size: 28px; font-weight: 700; font-family: var(--mono); color: var(--accent); line-height: 1; }
  .kpi-val.green { color: #3dba8c; } .kpi-val.blue { color: #3a78cc; }
  .kpi-val.red   { color: #e04040; } .kpi-val.sky  { color: #5090dd; }
  .kpi-val.orange{ color: #cc8800; }
  .kpi-label { font-size: 11px; color: var(--text2); margin-top: 4px; font-weight: 500; }
  .kpi-sub { font-size: 10px; color: var(--text3); margin-top: 2px; }
  .dash-section { margin-bottom: 20px; }
  .dash-section-title { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; padding-bottom: 6px; border-bottom: 2px solid var(--border); }
  .dash-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media(max-width:800px){ .dash-grid-2 { grid-template-columns: 1fr; } }
  .dash-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .dash-table th { background: var(--surface2); color: var(--text2); padding: 8px 12px; text-align: center; font-weight: 700; font-size: 11px; border-bottom: 2px solid var(--border); white-space: nowrap; }
  .dash-table th.left { text-align: left; }
  .dash-table td { padding: 7px 12px; border-bottom: 1px solid var(--border); text-align: center; }
  .dash-table td.left { text-align: left; font-weight: 600; }
  .dash-table tr.total-row td { border-top: 2px solid var(--border2); font-weight: 700; background: var(--surface2); }
  .dash-table tr:hover:not(.total-row) td { background: #fff8fa; }
  .dash-num { font-family: var(--mono); font-weight: 600; }
  .dash-num-0 { color: var(--text3); font-weight: 400; }
  .trend-row { display: flex; align-items: center; gap: 6px; padding: 6px 0; border-bottom: 1px solid var(--border); }
  .trend-row:last-child { border-bottom: none; }
  .trend-label { font-size: 12px; color: var(--text2); min-width: 90px; font-weight: 500; }
  .trend-bar { flex: 1; height: 20px; background: var(--surface2); border-radius: 5px; overflow: hidden; }
  .trend-bar-fill { height: 100%; border-radius: 5px; display: flex; align-items: center; padding-left: 6px; font-size: 10px; font-weight: 700; color: #fff; transition: width .4s; white-space: nowrap; min-width: 0; }
  .trend-val { font-size: 12px; font-weight: 700; color: var(--text2); min-width: 30px; text-align: right; }

  @media print {
    header, .tabs, .ctrl-bar, .btn, .btn-save, .btn-add, .btn-warn, .pagination, #toast { display: none !important; }
    /* 기본: 모든 패널 숨김 */
    .panel { display: none !important; }
    /* 연차확인서 인쇄 모드: panel5만 표시 */
    body.printing-cert #panel5 { display: block !important; padding: 0; }
    body.printing-cert #panel5 .ctrl-bar { display: none !important; }
    body { background: #fff; }
    .cert-card { box-shadow: none !important; border: 1px solid #ddd !important; }
    .cert-card + div { display: none; } /* 카드 사이 여백 숨김 */
  }

  .settings-item {
    display: flex; align-items: center; gap: 8px;
    width: 100%; padding: 9px 14px;
    background: none; border: none; cursor: pointer;
    font-size: 13px; color: var(--text); text-align: left;
    transition: background .12s;
  }
  .settings-item:hover { background: var(--surface2); }

  /* ── 열람모드 차단 ── */
  body.view-mode [onclick*="openEmpModal"],
  body.view-mode [onclick*="deleteEmp"],
  body.view-mode [onclick*="openDayBulkModal"],
  body.view-mode [onclick*="openAttModal"],
  body.view-mode [onclick*="openPasteModal"],
  body.view-mode [onclick*="confirmReset"],
  body.view-mode [onclick*="saveIssueMemo"],
  body.view-mode [onclick*="clearIssueMemo"],
  body.view-mode [onclick*="toggleIssueMemoEdit"],
  body.view-mode .team-color-btn,
  body.view-mode input[onchange*="teamColor"],
  body.view-mode .att-cell { pointer-events: none !important; cursor: default !important; }

  body.view-mode .admin-only { display: none !important; }
  body.view-mode #mode-switch-btn { display: none !important; }
  body.readonly-mode [onclick*="openBulkModal"],
  body.readonly-mode [onclick*="openEditEmpModal"] {
    pointer-events: none !important; cursor: not-allowed !important;
  }
  body.readonly-mode .att-cell { pointer-events: none !important; cursor: default !important; }
  body.readonly-mode .emp-name { pointer-events: none !important; text-decoration: none !important; color: var(--text) !important; cursor: default !important; }

  /* 회색 처리 (비활성화 시각화) */
  body.readonly-mode .btn-add,
  body.readonly-mode .btn-warn,
  body.readonly-mode [onclick*="deleteEmp"],
  body.readonly-mode [onclick*="resetEmpData"],
  body.readonly-mode [onclick*="confirmResetMonthAtt"],
  body.readonly-mode [onclick*="openTeamColorModal"] {
    pointer-events: none !important; cursor: not-allowed !important;
    opacity: 0.4 !important; filter: grayscale(1) !important;
  }
  #lock-btn { background: #fff0e0; color: #cc6000; border: 1.5px solid #ffcc80; border-radius: 8px; padding: 7px 13px; font-size: 12px; cursor: pointer; font-family: var(--font); transition: all .15s; }
  #lock-btn:hover { background: #cc6000; color: #fff; }

  
  .salary-table-wrap { overflow-x:auto; }
  .salary-table { width:100%; border-collapse:collapse; font-size:11px; }
  .salary-table th { background:var(--surface2); padding:7px 10px; font-size:10px; font-weight:700; text-align:center; border:1px solid var(--border); white-space:nowrap; }
  .salary-table td { padding:6px 10px; border:1px solid var(--border); text-align:right; white-space:nowrap; }
  .salary-table td:first-child { text-align:left; font-weight:600; }
  .issue-section { margin-bottom: 20px; }
  .issue-section-title { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 10px; padding-bottom: 7px; border-bottom: 2px solid var(--border); display: flex; align-items: center; gap: 8px; }
  .issue-count { font-size: 11px; font-weight: 400; color: var(--text3); margin-left: 4px; }
  .issue-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .issue-table th { background: var(--surface2); padding: 8px 12px; text-align: left; font-size: 11px; font-weight: 700; color: var(--text2); border-bottom: 2px solid var(--border); white-space: nowrap; }
  .issue-table td { padding: 8px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  .issue-table tr:last-child td { border-bottom: none; }
  .issue-table tr:hover td { background: #fff8fa; }
  .issue-empty { font-size: 12px; color: var(--text3); padding: 12px 0; text-align: center; }
  .issue-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media(max-width:800px) { .issue-grid { grid-template-columns: 1fr; } }
</style>
</head>

function isHoliday(y, m, d) {
  return KR_HOLIDAYS.has(`${y}-${m}-${d}`);
}

// 실효OB 월별 근무일 계산 (영업일 4번째~13번째, 10일)
function getObWorkDays(year, month) {
  const totalDays = new Date(year, month, 0).getDate();
  const workDays = [];
  for (let d = 1; d <= totalDays; d++) {
    const dow = new Date(year, month-1, d).getDay();
    if (dow === 0 || dow === 6) continue; // 토·일 제외
    if (isHoliday(year, month, d)) continue; // 공휴일 제외
    workDays.push(d);
  }
  return new Set(workDays.slice(3, 13)); // 4번째~13번째 (10일)
}

// 특정 날짜가 실효OB 근무일인지
function isObWorkDay(year, month, day) {
  return getObWorkDays(year, month).has(day);
}

function getDefaultAtt(year, month, day) {
  if (isHoliday(year, month, day)) return '공휴일';
  const dow = new Date(year, month - 1, day).getDay();
  if (dow === 0) return '휴일';  // 일요일
  if (dow === 6) return '휴무';  // 토요일
  return '○';                    // 월~금 출근

async function loadData() {
  // DEFAULT 데이터로 먼저 초기화
  employees = JSON.parse(JSON.stringify(DEFAULT_EMPLOYEES));
  attendance = {};
  loadDefaultAttendance();

  const el = document.getElementById('save-status');
  if (el) el.textContent = '데이터 불러오는 중...';

  const ok = await dbLoad();
  if (ok) {
    // DB 직원 데이터에 DEFAULT의 parentalLeave/leaveHistory/grade 보존
    const defaultMap = {};
    DEFAULT_EMPLOYEES.forEach(d => { defaultMap[d.name] = d; });
    employees = employees.map(emp => {
      const def = defaultMap[emp.name] || {};
      // parentalLeave: DB에 없거나 비어있으면 DEFAULT 사용
      if ((!emp.parentalLeave || !emp.parentalLeave.length) && def.parentalLeave && def.parentalLeave.length)
        emp.parentalLeave = def.parentalLeave;
      // leaveHistory: DB에 없거나 비어있으면 DEFAULT 사용
      if ((!emp.leaveHistory || !emp.leaveHistory.length) && def.leaveHistory && def.leaveHistory.length)
        emp.leaveHistory = def.leaveHistory;
      // grade: 없으면 DEFAULT
      if (!emp.grade && def.grade) emp.grade = def.grade;
      return emp;
    });
    if (el) el.textContent = '✅ 불러오기 완료';
  } else {
    if (el) el.textContent = '기본 데이터 사용 중';
  }
}

function initSummaryDashControls() {
  const ysel = document.getElementById('sum-base-year');
  const msel = document.getElementById('sum-base-month');
  const now = new Date();
  for (let y = 2023; y <= 2028; y++) {
    const o = document.createElement('option');
    o.value = y; o.textContent = y+'년';
    if (y === now.getFullYear()) o.selected = true;
    ysel.appendChild(o);
  }
  for (let m = 1; m <= 12; m++) {
    const o = document.createElement('option');
    o.value = m; o.textContent = m+'월';
    if (m === now.getMonth()+1) o.selected = true;
    msel.appendChild(o);
  }
}

function renderSummaryDash() {
  const year  = parseInt(document.getElementById('sum-base-year').value)  || new Date().getFullYear();
  const month = parseInt(document.getElementById('sum-base-month').value) || new Date().getMonth()+1;

  const ym1 = `${year}-${String(month).padStart(2,'0')}-01`;
  const ym2Last = new Date(year, month, 0).getDate();
  const ym2 = `${year}-${String(month).padStart(2,'0')}-${String(ym2Last).padStart(2,'0')}`;

  // ── 기본 집계 (해당 월 기준) ──
  const allEmps = employees;

  // 해당 월 말일 기준 재직자 (퇴사자 전부 제외)
  const todayStr = new Date().toISOString().slice(0, 10);

  const activeEmps = allEmps.filter(e => {
    if (e.joinDate > ym2) return false; // 아직 입사 전
    // 퇴사일 다음날부터 퇴사 → leaveDate < today 이면 이미 퇴사
    // 단, 이번 달 기준으로는 leaveDate가 이번 달 이전이면 퇴사자 제외
    if (e.leaveDate && e.leaveDate < ym1) return false; // 전달 이전 퇴사자 제외
    // 이번 달 내 퇴사자 중 오늘 기준 이미 퇴사한 경우 제외
    if (e.leaveDate && e.leaveDate < todayStr && e.leaveDate >= ym1 && e.leaveDate <= ym2) return false;
    return true;
  });

  const shortEmps = allEmps.filter(e => {
    if (!e.parentalLeave || !e.parentalLeave.length) return false;
    const today = new Date(year, month-1, 15);
    return e.parentalLeave.some(p => {
      if (!p.startDate) return false;
      const s = new Date(p.startDate.replace(/-/g,'/'));
      const en = p.endDate ? new Date(p.endDate.replace(/-/g,'/')) : new Date('9999/12/31');
      return today >= s && today <= en;
    });
  });

  // 해당 월 입사자
  const joinEmps = allEmps.filter(e => e.joinDate >= ym1 && e.joinDate <= ym2);
  // 해당 월 퇴사자: 퇴사일 기준 오늘 이전(이미 퇴사) + 이번 달 내
  const leaveEmps = allEmps.filter(e => e.leaveDate && e.leaveDate >= ym1 && e.leaveDate <= ym2 && e.leaveDate < todayStr);
  // 해당 월 퇴사 예정자: 퇴사일이 오늘 이후 + 이번 달 내
  const upcomingLeaveEmps = allEmps.filter(e => e.leaveDate && e.leaveDate >= todayStr && e.leaveDate <= ym2);

  // 평균 근속 (재직자 기준)
  const avgTenure = activeEmps.length
    ? (activeEmps.reduce((s,e) => s + (calcTenure(e)||0), 0) / activeEmps.length).toFixed(1)
    : 0;

  // 팀 목록
  const teams = getTeams();
  // 업무 목록
  const jobs = [...new Set(allEmps.map(e=>e.job||'-'))].sort();

  // ── 휴직/복직 체크 함수 (KPI보다 먼저 정의) ──
  const prevMonthLastDay = new Date(year, month-1, 0);
  const prevMonthLastStr = prevMonthLastDay.toISOString().slice(0,10);

  function isOnLeaveInMonth(e) {
    if (!e.leaveHistory || !e.leaveHistory.length) return false;
    return e.leaveHistory.some(l => {
      if (!l.startDate) return false;
      // 휴직 시작일이 오늘 이후면 아직 휴직 아님
      if (l.startDate > todayStr) return false;
      const s  = new Date(l.startDate.replace(/-/g,'/'));
      const en = l.endDate ? new Date(l.endDate.replace(/-/g,'/')) : new Date('9999/12/31');
      const mStart = new Date(year, month-1, 1);
      const mEnd   = new Date(year, month-1, ym2Last);
      if (!(s <= mEnd && en >= mStart)) return false;
      // 전월 말일 종료(1일 복직)는 제외
      if (l.endDate === prevMonthLastStr) return false;
      // 종료일 다음날부터 재직 → 오늘 기준으로 이미 복직했으면 휴직에서 제외
      if (l.endDate && l.endDate < todayStr) return false;
      return true;
    });
  }

  function isReturnInMonth(e) {
    if (!e.leaveHistory || !e.leaveHistory.length) return false;
    return e.leaveHistory.some(l => {
      if (!l.endDate) return false;
      return l.endDate >= ym1 && l.endDate <= ym2;
    });
  }

  // ── KPI 카드 ──
  const kpiHtml = `
    <div class="dash-kpi-row">
      <div class="kpi-card kpi-active">
        <div class="kpi-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-2px;flex-shrink:0"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div>
        <div class="kpi-val green">${activeEmps.filter(e => !isOnLeaveInMonth(e)).length}</div>
        <div class="kpi-label">재직 인원</div>
        <div class="kpi-sub">${year}년 ${month}월 기준 (퇴사자·휴직자 제외)</div>
      </div>
      <div class="kpi-card kpi-join">
        <div class="kpi-icon">🆕</div>
        <div class="kpi-val blue">${joinEmps.length}</div>
        <div class="kpi-label">${month}월 입사</div>
        <div class="kpi-sub">${joinEmps.map(e=>e.name).join(', ')||'없음'}</div>
      </div>
      <div class="kpi-card kpi-leave">
        <div class="kpi-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-2px;flex-shrink:0"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg></div>
        <div class="kpi-val red">${leaveEmps.length}</div>
        <div class="kpi-label">${month}월 퇴사</div>
        <div class="kpi-sub">${leaveEmps.map(e=>e.name).join(', ')||'없음'}</div>
        ${upcomingLeaveEmps.length ? `<div style="margin-top:6px;padding-top:6px;border-top:1px solid var(--border);font-size:11px;color:var(--text);">퇴사 예정 ${upcomingLeaveEmps.length}명</div><div class="kpi-sub">${upcomingLeaveEmps.map(e=>`${e.name}(${e.leaveDate.slice(5).replace('-','/')})`).join(', ')}</div>` : ''}
      </div>
      <div class="kpi-card kpi-short">
        <div class="kpi-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-2px;flex-shrink:0"><path d="M12 22V12"/><path d="M12 12C12 12 7 9 7 5a5 5 0 0 1 10 0c0 4-5 7-5 7z"/></svg></div>
        <div class="kpi-val sky">${shortEmps.length}</div>
        <div class="kpi-label">육아단축 인원</div>
        <div class="kpi-sub">${shortEmps.map(e=>e.name).join(', ')||'없음'}</div>
      </div>
      <div class="kpi-card kpi-avg">
        <div class="kpi-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-2px;flex-shrink:0"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div>
        <div class="kpi-val orange">${avgTenure}</div>
        <div class="kpi-label">평균 근속 (개월)</div>
        <div class="kpi-sub">재직자 기준</div>
      </div>
    </div>`;

  function makeGroupTable(groups, getKey) {
    const rows = groups.map(key => {
      const grpAll     = allEmps.filter(e => getKey(e) === key && (
        activeEmps.includes(e) ||
        (e.leaveDate && e.leaveDate >= ym1 && e.leaveDate <= ym2 && e.leaveDate < todayStr)
      ));
      const grpActive  = grpAll.filter(e => activeEmps.includes(e) && !isOnLeaveInMonth(e));
      const grpOnLeave = grpAll.filter(e => activeEmps.includes(e) && isOnLeaveInMonth(e));
      const grpReturn  = grpAll.filter(e => isReturnInMonth(e));
      const grpJoin    = grpAll.filter(e => e.joinDate >= ym1 && e.joinDate <= ym2);
      const grpLeave   = grpAll.filter(e => e.leaveDate && e.leaveDate >= ym1 && e.leaveDate <= ym2 && e.leaveDate < todayStr);
      const grpShort   = grpAll.filter(e => shortEmps.includes(e));
      const grpAvg     = grpActive.length
        ? (grpActive.reduce((s,e)=>s+(calcTenure(e)||0),0)/grpActive.length).toFixed(1) : '-';
      const pct = activeEmps.length ? Math.round(grpActive.length/activeEmps.length*100) : 0;
      return { key, total:grpAll.length, active:grpActive.length, onLeave:grpOnLeave.length, return:grpReturn.length, join:grpJoin.length, leave:grpLeave.length, short:grpShort.length, avg:grpAvg, pct,
        names:{ onLeave:grpOnLeave.map(e=>e.name), return:grpReturn.map(e=>e.name), join:grpJoin.map(e=>e.name), leave:grpLeave.map(e=>e.name) }
      };
    });

    const totalOnLeaveEmps = activeEmps.filter(e => isOnLeaveInMonth(e));
    const totalReturnEmps  = allEmps.filter(e => isReturnInMonth(e));
    const totRow = {
      key:'Total',
      total: new Set([...activeEmps, ...leaveEmps]).size,
      active: activeEmps.filter(e => !isOnLeaveInMonth(e)).length,
      onLeave: totalOnLeaveEmps.length, return: totalReturnEmps.length,
      join: joinEmps.length, leave: leaveEmps.length, short: shortEmps.length,
      avg: avgTenure, pct:100,
      names:{ onLeave:totalOnLeaveEmps.map(e=>e.name), return:totalReturnEmps.map(e=>e.name), join:joinEmps.map(e=>e.name), leave:leaveEmps.map(e=>e.name) }
    };

    const trs = [...rows, totRow].map((r) => {
      const isTot = r.key === 'Total';
      // 툴팁 없는 셀
      const n = v => v > 0 ? `<span class="dash-num">${v}</span>` : `<span class="dash-num dash-num-0">-</span>`;
      // 툴팁 있는 셀 (휴직/복직/입사/퇴사)
      const nt = (v, names) => {
        if (v <= 0) return `<span class="dash-num dash-num-0">-</span>`;
        const tip = names?.length ? names.join(', ') : '';
        return `<span class="dash-num" title="${tip}" style="cursor:default;border-bottom:1px dotted currentColor;">${v}</span>`;
      };
      const barW = Math.round(r.pct);
      return `<tr${isTot?' class="total-row"':''}>
        <td class="left">${isTot?'<strong>Total</strong>':r.key}</td>
        <td>${n(r.total)}</td>
        <td>${n(r.active)}
          <div style="margin-top:3px;width:44px;height:4px;background:var(--border);border-radius:2px;overflow:hidden;display:inline-block;vertical-align:middle;margin-left:4px">
            <div style="width:${barW}%;height:100%;background:var(--accent);border-radius:2px;"></div>
          </div>
        </td>
        <td style="color:#cc6000">${nt(r.onLeave, r.names?.onLeave)}</td>
        <td style="color:#3dba8c">${nt(r.return,  r.names?.return)}</td>
        <td style="color:#3a78cc">${nt(r.join,    r.names?.join)}</td>
        <td style="color:#e04040">${nt(r.leave,   r.names?.leave)}</td>
        <td style="color:#5090dd">${n(r.short)}</td>
        <td style="color:var(--text2);font-family:var(--mono)">${r.avg}</td>
      </tr>`;
    }).join('');

    return `<table class="dash-table">
      <thead><tr>
        <th class="left">구분</th>
        <th>전체</th>
        <th>재직</th>
        <th style="color:#cc6000">휴직</th>
        <th style="color:#3dba8c">복직</th>
        <th>입사</th><th>퇴사</th><th>단축</th><th>평균근속</th>
      </tr></thead>
      <tbody>${trs}</tbody>
    </table>`;
  }

  const teamTableHtml = makeGroupTable(teams, e => e.team);
  const jobTableHtml  = makeGroupTable(jobs,  e => e.job||'-');

  // ── 근속 구간 분포 ──
  const brackets = [
    { label:'1년 미만',  min:0,   max:11  },
    { label:'1~2년',    min:12,  max:23  },
    { label:'2~3년',    min:24,  max:35  },
    { label:'3~5년',    min:36,  max:59  },
    { label:'5년 이상', min:60,  max:9999},
  ];
  const maxBkt = Math.max(1, ...brackets.map(b =>
    activeEmps.filter(e => { const t=calcTenure(e); return t>=b.min && t<=b.max; }).length
  ));
  const bktHtml = brackets.map(b => {
    const cnt = activeEmps.filter(e => { const t=calcTenure(e); return t>=b.min && t<=b.max; }).length;
    const w = Math.round(cnt/maxBkt*100);
    return `<div class="trend-row">
      <div class="trend-label">${b.label}</div>
      <div class="trend-bar"><div class="trend-bar-fill" style="width:${w}%;background:var(--accent)">${cnt>0?cnt+'명':''}</div></div>
      <div class="trend-val">${cnt}</div>
    </div>`;
  }).join('');

  // ── 근무시간 분포 ──
  const hrGroups = [8,6,4].map(h => {
    const cnt = activeEmps.filter(e => getEffectiveHours(e) === h).length;
    const w = Math.round(cnt/Math.max(1,activeEmps.length)*100);
    return `<div class="trend-row">
      <div class="trend-label">${h}시간 근무</div>
      <div class="trend-bar"><div class="trend-bar-fill" style="width:${w}%;background:#5090dd">${cnt>0?cnt+'명':''}</div></div>
      <div class="trend-val">${cnt}</div>
    </div>`;
  }).join('');

  // ── 연도별 누적 (1월~선택월 누적) ──
  const yearlyJoin  = allEmps.filter(e => e.joinDate  && e.joinDate.startsWith(`${year}`)).length;
  const yearlyLeave = allEmps.filter(e => e.leaveDate && e.leaveDate.startsWith(`${year}`)).length;
  // 월별 입퇴사 추이
  const monthlyData = Array.from({length:12}, (_,i) => {
    const m = i+1;
    const pad = String(m).padStart(2,'0');
    const m1 = `${year}-${pad}-01`;

function selectTeamColorCustom(team, input) {
  const hex = input.value;
  // 텍스트 색상: 배경이 밝으면 어둡게, 어두우면 밝게
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  const lum = (r*299+g*587+b*114)/1000;
  const textHex = lum > 128 ? darkenHex(hex, 0.5) : lightenHex(hex, 0.8);
  const bgHex = lightenHex(hex, 0.88);
  teamColors[team] = { bg: bgHex, text: textHex, dot: hex };
  // 프리뷰 업데이트
  const rowEl = input.closest('.team-color-row');
  const preview = rowEl.querySelector('.badge');
  if (preview) { preview.style.background = bgHex; preview.style.color = textHex; }
  rowEl.querySelectorAll('.color-dot').forEach(d => d.classList.remove('selected'));
}

function darkenHex(hex, factor) {
  const r = Math.round(parseInt(hex.slice(1,3),16)*factor);
  const g = Math.round(parseInt(hex.slice(3,5),16)*factor);
  const b = Math.round(parseInt(hex.slice(5,7),16)*factor);
  return '#' + [r,g,b].map(v=>Math.min(255,v).toString(16).padStart(2,'0')).join('');
}
function lightenHex(hex, factor) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  const nr = Math.round(r + (255-r)*factor);
  const ng = Math.round(g + (255-g)*factor);
  const nb = Math.round(b + (255-b)*factor);
  return '#' + [nr,ng,nb].map(v=>Math.min(255,v).toString(16).padStart(2,'0')).join('');
}

  let filtered = employees.filter(e => {

    const tMatch = !teamFilter || e.team === teamFilter;
    const sMatch = !statusFilter || (() => { const s = getEmpStatus(e); if (statusFilter === 'active') return s === 'active'; if (statusFilter === 'onleave') return s === 'onleave'; if (statusFilter === 'left') return s === 'resigned'; return true; })();

  });

  filtered.sort((a, b) => {
    let va, vb;
    if (empSort.key === 'tenure') { va = calcTenure(a); vb = calcTenure(b); }
    else { va = a[empSort.key] || ''; vb = b[empSort.key] || ''; }
    if (typeof va === 'number') return (va - vb) * empSort.dir;
    return va.toString().localeCompare(vb.toString(), 'ko') * empSort.dir;
  });

  // 정렬 아이콘 업데이트

  });

  document.getElementById('emp-count').textContent = `총 ${filtered.length}명`;
  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  if (empPage > totalPages) empPage = totalPages;

function calcTenure(e) {
  // 전보일이 있으면 전보일 기준, 없으면 입사일 기준
  const baseDate = e.transferDate || e.joinDate;
  if (!baseDate) return '-';
  const start = new Date(baseDate);
  const end = e.leaveDate ? new Date(e.leaveDate) : new Date();
  const months = (end.getFullYear()-start.getFullYear())*12 + (end.getMonth()-start.getMonth());
  return months > 0 ? months : 0;
}

    leaveDate: document.getElementById('em-leave').value,
    memo: document.getElementById('em-memo').value.trim(),
    parentalLeave: getParentalListData(),
    leaveHistory: getLeaveHistData(),
    grade: existing.grade || '',
    hireInfo: existing.hireInfo || {},
    resignInfo: existing.resignInfo || {},
  };
  if (editEmpIdx>=0) employees[editEmpIdx] = emp;
  else employees.push(emp);
  closeModal('emp-modal');
  populateTeamFilter();
  renderEmpTable();
  showToast(editEmpIdx>=0 ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-2px;flex-shrink:0"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg> 직원 정보가 수정되었습니다.' : '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-2px;flex-shrink:0"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg> 직원이 추가되었습니다.');
  autoSave();
}

function getDaysInMonth(y, m) {
  return new Date(y, m, 0).getDate();
}
function getDayOfWeek(y, m, d) {
  return new Date(y, m-1, d).getDay(); // 0=일,6=토
}

function getAtt(name, year, month, day) {
  const ym = year+'_'+month;
  const stored = attendance[name]?.[ym]?.[String(day)];
  if (stored !== undefined) return typeof stored === 'object' ? stored.v : stored;
  return getDefaultAtt(year, month, day);
}
function getAttMemo(name, year, month, day) {
  const ym = year+'_'+month;
  const stored = attendance[name]?.[ym]?.[String(day)];
  if (stored && typeof stored === 'object') return stored.memo || '';
  return '';
}
function setAtt(name, year, month, day, val, memo) {
  const ym = year+'_'+month;
  if (!attendance[name]) attendance[name] = {};
  if (!attendance[name][ym]) attendance[name][ym] = {};
  if (memo) {
    attendance[name][ym][String(day)] = { v: val, memo };
  } else {
    attendance[name][ym][String(day)] = val;
  }
}

function renderAttTable() {
  const year = parseInt(document.getElementById('att-year').value);
  const month = parseInt(document.getElementById('att-month').value);
  const teamFilter = document.getElementById('att-team-filter').value;
  const statusFilter = document.getElementById('att-status-filter').value;
  const q = document.getElementById('att-search').value.trim();
  const sortKey = document.getElementById('att-sort').value;
  const days = getDaysInMonth(year, month);

  let emps = employees.filter(e => {
    const tMatch = !teamFilter || e.team === teamFilter;
    const qMatch = !q || e.name.includes(q);
    const sMatch = !statusFilter || (() => {
      const s = getEmpStatus(e);
      if (statusFilter === 'active')  return s === 'active';
      if (statusFilter === 'onleave') return s === 'onleave';
      if (statusFilter === 'left')    return s === 'resigned';
      return true;
    })();
    // 퇴사 다음달부터 목록 제외
    if (e.leaveDate) {
      const ldYear  = parseInt(e.leaveDate.slice(0,4));
      const ldMonth = parseInt(e.leaveDate.slice(5,7));
      if (year > ldYear || (year === ldYear && month > ldMonth)) return false;
    }
    // 입사 이전달까지 목록 제외 (입사월부터 표시)
    if (e.joinDate) {
      const jYear  = parseInt(e.joinDate.slice(0,4));
      const jMonth = parseInt(e.joinDate.slice(5,7));
      if (year < jYear || (year === jYear && month < jMonth)) return false;
    }
    return tMatch && qMatch && sMatch;
  });

  // 정렬
  if (sortKey === 'name') emps.sort((a,b) => a.name.localeCompare(b.name,'ko'));
  else if (sortKey === 'team') emps.sort((a,b) => a.team.localeCompare(b.team,'ko'));
  else if (sortKey === 'joinDate') emps.sort((a,b) => (a.joinDate||'').localeCompare(b.joinDate||''));

  // thead
  const thead = document.getElementById('att-thead');
  let dayHeaders = '';
  for (let d = 1; d <= days; d++) {
    const dow = getDayOfWeek(year, month, d);
    const hol = isHoliday(year, month, d);
    const dayNames = ['일','월','화','수','목','금','토'];
    let cls = '';
    if (hol) cls = ' day-hol day-sun';
    else if (dow === 0) cls = ' day-sun'; // 일요일
    else if (dow === 6) cls = ' day-sat'; // 토요일
    const holTitle = hol ? ' title="공휴일"' : '';
    dayHeaders += `<th class="day-col${cls} day-col-clickable"${holTitle} onclick="openDayBulkModal(${year},${month},${d})" title="${d}일 클릭: 날짜별 일괄변경">${d}<br><span style="font-size:9px;font-weight:400">${dayNames[dow]}</span></th>`;
  }
  // 날짜별 출근인원 집계 (○=1, 반차=0.5)
  let countHeaders = '';
  for (let d = 1; d <= days; d++) {
    const dow = getDayOfWeek(year, month, d);
    const hol = isHoliday(year, month, d);
    let bgStyle = '';
    if (hol) bgStyle = 'background:#fff5f5;';
    else if (dow === 0) bgStyle = 'background:#fff5f5;';
    else if (dow === 6) bgStyle = 'background:#f5f8ff;';

    let cnt = 0;
    emps.forEach(e => {
      const v = getAtt(e.name, year, month, d);
      if (v === '○') cnt += 1;
      else if (v === '반차') cnt += 0.5;
    });
    const disp = cnt === 0 ? '' : (cnt % 1 === 0 ? cnt : cnt.toFixed(1));
    const color = cnt > 0 ? 'color:var(--accent);font-weight:700;' : 'color:var(--text3);';
    countHeaders += `<td style="text-align:center;font-size:10px;padding:3px 1px;${bgStyle}${color}">${disp}</td>`;
  }

  // 월별 합계 집계
  let totalCnt = {연차:0, 반차:0, 결근:0, 청휴:0, 기타:0};
  emps.forEach(e => {
    for (let d = 1; d <= days; d++) {
      const v = getAtt(e.name, year, month, d);
      if (v === '연차') totalCnt['연차']++;
      else if (v === '반차') totalCnt['반차']++;
      else if (v === '결근') totalCnt['결근']++;
      else if (v === '청휴') totalCnt['청휴']++;
      else if (v && !['○','공휴일','휴무','휴일',''].includes(v)) totalCnt['기타']++;
    }
  });
  const sumCell = (val, color) => val > 0
    ? `<td style="text-align:center;font-size:10px;font-weight:700;color:${color};background:var(--surface2);">${val}</td>`
    : `<td style="background:var(--surface2);"></td>`;

  thead.innerHTML = `<tr>
    <th style="min-width:36px;">No</th>
    <th style="min-width:70px;cursor:pointer;" title="클릭하면 해당 직원 월 전체 편집">성명 <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-2px;flex-shrink:0"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></th>
    <th style="min-width:90px;font-size:10px">사번</th>
    <th style="min-width:100px;font-size:10px">팀</th>
    <th style="min-width:88px;font-size:10px">입사일</th>
    <th style="min-width:88px;font-size:10px">전보일</th>
    <th style="min-width:88px;font-size:10px">퇴사일</th>
    ${dayHeaders}
    <th class="summary-col summary-head">연차</th>
    <th class="summary-col summary-head">반차</th>
    <th class="summary-col summary-head">결근</th>
    <th class="summary-col summary-head">청휴</th>
    <th class="summary-col summary-head">기타</th>
  </tr>
  <tr style="background:var(--surface2);border-bottom:2px solid var(--border);">
    <td colspan="6" style="font-size:10px;font-weight:700;color:var(--text2);padding:4px 8px;position:sticky;left:0;background:var(--surface2);z-index:3;white-space:nowrap;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-2px;flex-shrink:0"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg> 출근인원</td>
    ${countHeaders}
    ${sumCell(totalCnt['연차'], 'var(--accent)')}
    ${sumCell(totalCnt['반차'], '#5090dd')}
    ${sumCell(totalCnt['결근'], 'var(--danger)')}
    ${sumCell(totalCnt['청휴'], '#3dba8c')}
    ${sumCell(totalCnt['기타'], 'var(--text2)')}
  </tr>`;

  const tbody = document.getElementById('att-tbody');
  if (!emps.length) { tbody.innerHTML=`<tr><td colspan="${days+11}" class="empty-msg">표시할 직원이 없습니다.</td></tr>`; return; }

  tbody.innerHTML = emps.map((e, idx) => {
    let cells = '';
    let cnt = {연차:0,반차:0,결근:0,청휴:0,기타:0};

    // 입사일/퇴사일 파싱 (로컬 시간 기준으로 정규화)
    const joinDate  = e.joinDate  ? new Date(e.joinDate.replace(/-/g, '/'))  : null;
    const leaveDate = e.leaveDate ? new Date(e.leaveDate.replace(/-/g, '/')) : null;

    for (let d = 1; d <= days; d++) {
      const cellDate = new Date(year, month-1, d);
      const dow = getDayOfWeek(year, month, d);
      const hol = isHoliday(year, month, d);
      let tdStyle = '';
      if (hol || dow === 0) tdStyle = ' style="background:#fff5f5"';
      else if (dow === 6) tdStyle = ' style="background:#f5f8ff"';

      // 입사일 이전: 공란 (수정 불가)
      if (joinDate && cellDate < joinDate) {
        cells += `<td style="background:#f8f8f8;"></td>`;
        continue;
      }
      // 퇴사 다음날부터: 공란 (수정 불가)
      if (leaveDate && cellDate > leaveDate) {
        cells += `<td style="background:#f8f8f8;"></td>`;
        continue;
      }
      // 실효OB: 근무기간(첫근무일~마지막근무일) 밖의 날만 공란
      if (e.team === '실효OB') {
        const obDays = getObWorkDays(year, month);
        const obArr = [...obDays].sort((a,b) => a-b);
        const obStart = obArr[0];
        const obEnd   = obArr[obArr.length-1];
        // 근무기간 밖이면 공란
        if (d < obStart || d > obEnd) {
          cells += `<td${tdStyle} style="background:#f5f5f5;opacity:0.5;"></td>`;
          continue;
        }
        // 근무기간 안이지만 비근무일(토/일/공휴일)이면 그냥 기본 표시 (아래로 fall-through)
      }
      // 휴직 기간: 휴직 표시 (수정 불가)
      if (isOnLeaveHistory(e, year, month, d)) {
        const leaveType = e.leaveHistory.find(l => {
          if (!l.startDate) return false;
          const s = new Date(l.startDate.replace(/-/g,'/'));
          const en = l.endDate ? new Date(l.endDate.replace(/-/g,'/')) : new Date('9999/12/31');
          const cur = new Date(year, month-1, d);
          return cur >= s && cur <= en;
        })?.type || '휴직';
        cells += `<td${tdStyle} style="background:#fff8f0;" title="${leaveType}"><div class="att-cell-wrap"><span class="att-cell att-휴직" style="pointer-events:none;cursor:default;font-size:9px;">${leaveType.slice(0,3)}</span></div></td>`;
        continue;
      }

      const val = getAtt(e.name, year, month, d);
      const rawDisp = val === '○' ? '●' : (val || '·');
      const display = rawDisp.length > 3 ? rawDisp.slice(0, 3) : rawDisp;
      const cls = ATT_CLASS[val] !== undefined ? ATT_CLASS[val] : 'att-미입력';
      const titleText = val ? `${d}일: ${val}` : `${d}일`;
      cells += `<td${tdStyle}><div class="att-cell-wrap"><span class="att-cell ${cls}" onclick="openAttModal('${e.name}',${year},${month},${d})" title="${titleText}">${display}</span>${getAttMemo(e.name,year,month,d)?`<div class="att-memo-pin"></div><div class="att-memo-tooltip">${getAttMemo(e.name,year,month,d)}</div>`:''}</div></td>`;
      if (val==='연차') cnt['연차']++;
      else if (val==='반차') cnt['반차']++;
      else if (val==='결근') cnt['결근']++;
      else if (val==='청휴') cnt['청휴']++;
      else if (val && !['○','공휴일','휴무','휴일',''].includes(val)) cnt['기타']++;
    }
    const isLeft = !!e.leaveDate;
    const attCurPH = getParentalHours(e, year, month, 15);
    const attParentalTag = attCurPH !== null ? `<span class="parental-badge">단축${attCurPH}h</span>` : '';
    return `<tr>
      <td style="color:var(--text3);font-family:var(--mono);position:sticky;left:0;background:var(--surface);z-index:1;">${idx+1}</td>
      <td class="emp-name" style="font-weight:700;position:sticky;left:36px;background:var(--surface);z-index:1;" title="${e.name}">${e.name}${attParentalTag}</td>
      <td style="font-size:11px;color:var(--text2);font-family:var(--mono)">${e.empId||'-'}</td>
      <td style="font-size:11px">${getTeamBadge(e.team,'font-size:10px;')}</td>
      <td style="font-size:11px;color:var(--text2)">${e.joinDate||'-'}</td>
      <td style="font-size:11px;color:var(--text3)">${e.transferDate||'-'}</td>
      <td style="font-size:11px;color:${isLeft?'var(--danger)':'var(--text3)'}">${e.leaveDate||'-'}</td>
      ${cells}
      <td class="summary-col"><span class="num ${cnt['연차']?'':'num-0'}">${cnt['연차']||0}</span></td>
      <td class="summary-col"><span class="num ${cnt['반차']?'':'num-0'}">${cnt['반차']||0}</span></td>
      <td class="summary-col"><span class="num ${cnt['결근']?'att-결근':'num-0'}">${cnt['결근']||0}</span></td>
      <td class="summary-col"><span class="num ${cnt['청휴']?'':'num-0'}">${cnt['청휴']||0}</span></td>
      <td class="summary-col"><span class="num ${cnt['기타']?'':'num-0'}">${cnt['기타']||0}</span></td>
    </tr>`;
  }).join('');
}

function confirmResetMonthAtt() {
  const year = parseInt(document.getElementById('att-year').value);
  const month = parseInt(document.getElementById('att-month').value);

// ── 결근 자동처리 ──
function getSundayOfWeek(year, month, day) {
  const d = new Date(year, month-1, day);
  const dow = d.getDay();
  const diff = dow === 0 ? 0 : 7 - dow;
  const sun = new Date(d); sun.setDate(d.getDate() + diff);
  return { year: sun.getFullYear(), month: sun.getMonth()+1, day: sun.getDate() };
}
function getWeekDays(year, month, day) {
  const d = new Date(year, month-1, day);
  const dow = d.getDay();
  const monOff = dow === 0 ? -6 : 1 - dow;
  const result = [];
  for (let i = 0; i <= 6; i++) {
    const cur = new Date(d); cur.setDate(d.getDate() + monOff + i);
    result.push({ y: cur.getFullYear(), m: cur.getMonth()+1, d: cur.getDate() });
  }
  return result;
}
function applyAbsenceRules(name, year, month, day, isAbsent) {
  const sun = getSundayOfWeek(year, month, day);
  const d = new Date(year, month-1, day);
  const dow = d.getDay();

  if (!isAbsent) {
    // 결근 취소 → 이 주 다른 결근 없으면 일요일 무급휴가 원복
    const weekDays = getWeekDays(year, month, day);
    const otherAbsent = weekDays.some(wd => {
      if (wd.y===year && wd.m===month && wd.d===day) return false;
      return getAtt(name, wd.y, wd.m, wd.d) === '결근';
    });
    if (!otherAbsent) {
      const ym = sun.year+'_'+sun.month;
      const sv = getAtt(name, sun.year, sun.month, sun.day);
      if (sv === '무급휴가' && attendance[name]?.[ym])
        delete attendance[name][ym][String(sun.day)];
    }
    // 금/월 연속결근 토·일 결근 원복
    if (dow === 5) {
      const mon = new Date(d); mon.setDate(d.getDate()+3);
      if (getAtt(name, mon.getFullYear(), mon.getMonth()+1, mon.getDate()) !== '결근') {
        for (let i=1; i<=2; i++) {
          const cur = new Date(d); cur.setDate(d.getDate()+i);
          const cy=cur.getFullYear(),cm=cur.getMonth()+1,cd=cur.getDate();
          if (getAtt(name,cy,cm,cd)==='결근') {
            const cym=cy+'_'+cm;
            if(attendance[name]?.[cym]) delete attendance[name][cym][String(cd)];
          }
        }
      }
    }
    if (dow === 1) {
      const fri = new Date(d); fri.setDate(d.getDate()-3);
      if (getAtt(name, fri.getFullYear(), fri.getMonth()+1, fri.getDate()) !== '결근') {
        for (let i=1; i<=2; i++) {
          const cur = new Date(d); cur.setDate(d.getDate()-i);
          const cy=cur.getFullYear(),cm=cur.getMonth()+1,cd=cur.getDate();
          if (getAtt(name,cy,cm,cd)==='결근') {
            const cym=cy+'_'+cm;
            if(attendance[name]?.[cym]) delete attendance[name][cym][String(cd)];
          }
        }
      }
    }
    return;
  }

  // 결근 적용
  // 1. 이 주 일요일 → 무급휴가 (공휴일 제외)
  if (!isHoliday(sun.year, sun.month, sun.day))
    setAtt(name, sun.year, sun.month, sun.day, '무급휴가', '');

  // 2. 금/월 연속결근 → 토·일 결근
  if (dow === 5) {
    const mon = new Date(d); mon.setDate(d.getDate()+3);
    if (getAtt(name, mon.getFullYear(), mon.getMonth()+1, mon.getDate()) === '결근') {
      for (let i=1; i<=2; i++) {
        const cur = new Date(d); cur.setDate(d.getDate()+i);
        const cy=cur.getFullYear(),cm=cur.getMonth()+1,cd=cur.getDate();
        if (!isHoliday(cy,cm,cd)) setAtt(name,cy,cm,cd,'결근','');
      }
    }
  }
  if (dow === 1) {
    const fri = new Date(d); fri.setDate(d.getDate()-3);
    if (getAtt(name, fri.getFullYear(), fri.getMonth()+1, fri.getDate()) === '결근') {
      for (let i=1; i<=2; i++) {
        const cur = new Date(d); cur.setDate(d.getDate()-i);
        const cy=cur.getFullYear(),cm=cur.getMonth()+1,cd=cur.getDate();
        if (!isHoliday(cy,cm,cd)) setAtt(name,cy,cm,cd,'결근','');
      }
    }
  }
}

function saveAttEntry() {
  if (!attModalTarget) return;
  const {name, year, month, day} = attModalTarget;
  const memo = document.getElementById('att-memo-input').value.trim();
  const prevVal = getAtt(name, year, month, day);

  // ── 잔여연차 체크 (연차/반차 입력 시) ──
  if (selectedAttType === '연차' || selectedAttType === '반차') {
    const emp = employees.find(e => e.name === name);
    if (emp) {
      const checkYear = new Date().getFullYear(); // 항상 현재 연도 기준
      const lv = calcAnnualLeave(emp, checkYear);
      if (lv) {
        const ph = getParentalHours(emp, year, month, day);
        const hrsPerDay = ph !== null ? ph : 8;
        const prevHrs = prevVal === '연차' ? hrsPerDay : prevVal === '반차' ? hrsPerDay / 2 : 0;
        const needHrs = selectedAttType === '연차' ? hrsPerDay : hrsPerDay / 2;
        const availHrs = lv.remainHours + prevHrs;

        if (needHrs > availHrs) {
          const availDays = Math.round(availHrs / hrsPerDay * 10) / 10;
          if (availHrs <= 0) {
            showToast(`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-2px;flex-shrink:0"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg> ${name}의 잔여연차가 없습니다. (잔여 0h)`, true);
          } else {
            showToast(`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-2px;flex-shrink:0"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg> 잔여연차 부족. 잔여 ${availHrs}h(${availDays}일) — ${selectedAttType === '연차' ? '연차' : '반차'}(${needHrs}h) 불가`, true);
          }
          return;
        }
      }
    }
  }

  if (selectedAttType === '') {
    const ym = year+'_'+month;
    if (attendance[name]?.[ym]) delete attendance[name][ym][String(day)];
    if (prevVal === '결근') applyAbsenceRules(name, year, month, day, false);
  } else {
    setAtt(name, year, month, day, selectedAttType, memo);
    if (selectedAttType === '결근') applyAbsenceRules(name, year, month, day, true);
    else if (prevVal === '결근') applyAbsenceRules(name, year, month, day, false);
  }
  closeModal('att-modal');
  renderAttTable();
  autoSave();
}

let bulkSelectedDays = new Set(); // 선택된 날짜
let isDragging = false;
let dragMode = null; // 'select' | 'deselect'

function openBulkModal(name, year, month) {
  bulkTarget = { name, year, month };
  bulkSelectedDays = new Set();
  const days = getDaysInMonth(year, month);

    `${emp ? emp.team + ' · ' + emp.job : ''} · 날짜를 클릭하거나 드래그해서 선택 후 근태 유형을 적용하세요.`;

  renderBulkCal(year, month, days);
  renderBulkTypeBtns();

function renderBulkCal(year, month, days) {
  const dayNames = ['일','월','화','수','목','금','토'];
  const cal = document.getElementById('bulk-cal');
  let html = dayNames.map(d => `<div class="bulk-cal-head">${d}</div>`).join('');

  const firstDow = new Date(year, month-1, 1).getDay();
  for (let i = 0; i < firstDow; i++) html += '<div></div>';

  for (let d = 1; d <= days; d++) {
    const dow = new Date(year, month-1, d).getDay();
    const hol = isHoliday(year, month, d);
    const val = bulkDays[d] || '';
    const valCls = ATT_CLASS[val] !== undefined ? ATT_CLASS[val] : 'att-미입력';
    const display = val === '○' ? '●' : (val || '·');
    const isSel = bulkSelectedDays.has(d);
    let bgCls = hol ? 'bcc-hol' : dow === 0 ? 'bcc-sun' : dow === 6 ? 'bcc-off' : '';
    const numColor = hol ? 'var(--danger)' : dow === 0 ? 'var(--danger)' : dow === 6 ? '#4080cc' : 'var(--text2)';
    html += `<div class="bulk-cal-cell ${bgCls}${isSel?' selected':''}" id="bcc-${d}"
      onmousedown="bulkMouseDown(event,${d})"
      onmouseenter="bulkMouseEnter(${d})"
      onmouseup="bulkMouseUp()">
      <div class="bcn" style="color:${numColor}">${d}</div>
      <div class="bcd">${dayNames[dow]}${hol?'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-2px;flex-shrink:0"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>':''}</div>
      <div class="bcv ${valCls}" id="bcv-${d}">${display}</div>
    </div>`;
  }
  cal.innerHTML = html;

  // 드래그 끝 처리
  document.addEventListener('mouseup', bulkMouseUp, {once:false});
}

function renderBulkTypeBtns() {
  const types = ['○','연차','반차','공휴일','휴무','휴일','결근','청휴','병가','무급휴가','보건','가족돌봄','공가','유급','배우자출산','교육'];
  document.getElementById('bulk-type-btns').innerHTML = types.map(t => {
    const lbl = t === '○' ? '● 출근' : t;
    const cls = ATT_CLASS[t] || '';
    return `<span class="att-cell ${cls}" style="cursor:pointer;padding:5px 10px;font-size:12px;border:1.5px solid var(--border);width:auto;min-width:unset;white-space:nowrap;"
      onclick="quickApplyType('${t}')">${lbl}</span>`;
  }).join('');
}

// 드래그 선택
function bulkMouseDown(e, d) {
  e.preventDefault();
  isDragging = true;
  dragMode = bulkSelectedDays.has(d) ? 'deselect' : 'select';
  toggleBulkDay(d);
}
function bulkMouseEnter(d) {
  if (!isDragging) return;
  if (dragMode === 'select') selectBulkDay(d);
  else deselectBulkDay(d);
}
function bulkMouseUp() { isDragging = false; }

function toggleBulkDay(d) {
  if (bulkSelectedDays.has(d)) deselectBulkDay(d);
  else selectBulkDay(d);
}
function selectBulkDay(d) {
  bulkSelectedDays.add(d);
  document.getElementById('bcc-'+d)?.classList.add('selected');
  updateBulkSelCount();
}
function deselectBulkDay(d) {
  bulkSelectedDays.delete(d);
  document.getElementById('bcc-'+d)?.classList.remove('selected');
  updateBulkSelCount();
}
function bulkSelectAll() {
  const days = getDaysInMonth(bulkTarget.year, bulkTarget.month);
  for (let d = 1; d <= days; d++) selectBulkDay(d);
}
function bulkClearSel() {
  [...bulkSelectedDays].forEach(d => deselectBulkDay(d));
}
function updateBulkSelCount() {
  const el = document.getElementById('bulk-sel-count');
  if (el) el.textContent = bulkSelectedDays.size > 0 ? `${bulkSelectedDays.size}일 선택됨` : '날짜를 선택하세요';
}

// 유형 버튼 클릭 시 즉시 적용 (선택된 날에)
function quickApplyType(type) {
  if (bulkSelectedDays.size === 0) { showToast('먼저 날짜를 선택해주세요.', true); return; }
  applyBulkType(type);
}

function applyBulkType(type) {
  if (bulkSelectedDays.size === 0) { showToast('먼저 날짜를 선택해주세요.', true); return; }
  const { name, year, month } = bulkTarget;
  const skipHol = document.getElementById('bulk-skip-hol').checked;

  // 연차/반차 잔여 체크
  if (type === '연차' || type === '반차') {
    const emp = employees.find(e => e.name === name);
    if (emp) {
      const checkYear = new Date().getFullYear();
      const lv = calcAnnualLeave(emp, checkYear);
      if (lv) {
        // 선택된 날짜 중 실제 적용될 날 수 계산
        let totalNeedHrs = 0;
        let prevRefundHrs = 0;
        bulkSelectedDays.forEach(d => {
          if (skipHol && isHoliday(year, month, d)) return;
          const ph = getParentalHours(emp, year, month, d);
          const hrsPerDay = ph !== null ? ph : 8;
          totalNeedHrs += type === '연차' ? hrsPerDay : hrsPerDay / 2;
          // 기존 연차/반차 환급
          const cur = bulkDays[d];
          if (cur === '연차') prevRefundHrs += hrsPerDay;
          else if (cur === '반차') prevRefundHrs += hrsPerDay / 2;
        });
        const availHrs = lv.remainHours + prevRefundHrs;
        if (totalNeedHrs > availHrs) {
          showToast(`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-2px;flex-shrink:0"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg> 잔여연차 부족. 필요 ${totalNeedHrs}h, 가용 ${availHrs}h (잔여 ${lv.remainHours}h)`, true);
          return;
        }
      }
    }
  }

  let count = 0;
  bulkSelectedDays.forEach(d => {
    if (skipHol && isHoliday(year, month, d)) return;
    bulkDays[d] = type;
    const display = type === '○' ? '●' : (type || '·');
    const valCls = ATT_CLASS[type] !== undefined ? ATT_CLASS[type] : 'att-미입력';
    const el = document.getElementById('bcv-'+d);
    if (el) { el.textContent = display; el.className = 'bcv ' + valCls; }
    count++;
  });
  showToast(`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-2px;flex-shrink:0"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg> ${count}일에 "${type === '○' ? '출근' : type}" 적용됨`);
}

function saveBulkEdit() {
  const { name, year, month } = bulkTarget;
  const emp = employees.find(e => e.name === name);
  const checkYear = new Date().getFullYear();
  const lv = emp ? calcAnnualLeave(emp, checkYear) : null;

  // 저장 전 최종 연차/반차 합계 체크
  if (lv) {
    const days = getDaysInMonth(year, month);
    let totalNeedHrs = 0;
    // 기존 저장된 이 월의 연차 사용량 제외하고 새 bulkDays 기준으로 계산
    // 다른 월에 사용된 연차는 lv.remainHours에 이미 반영되어 있음
    // 이 월의 기존값과 새값 차이만 계산
    for (let d = 1; d <= days; d++) {
      const oldVal = getAtt(name, year, month, d);
      const newVal = bulkDays[d];
      const ph = emp ? getParentalHours(emp, year, month, d) : null;
      const h = ph !== null ? ph : 8;
      const oldH = oldVal === '연차' ? h : oldVal === '반차' ? h/2 : 0;
      const newH = newVal === '연차' ? h : newVal === '반차' ? h/2 : 0;
      totalNeedHrs += (newH - oldH); // 증가분만 계산
    }
    if (totalNeedHrs > lv.remainHours + 0.01) { // 부동소수점 허용
      showToast(`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-2px;flex-shrink:0"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg> 잔여연차 부족으로 저장 불가. 필요 추가 ${Math.round(totalNeedHrs*10)/10}h, 잔여 ${lv.remainHours}h`, true);
      return;
    }
  }

  const days = getDaysInMonth(year, month);
  const ym = year + '_' + month;
  if (!attendance[name]) attendance[name] = {};
  if (!attendance[name][ym]) attendance[name][ym] = {};
  for (let d = 1; d <= days; d++) attendance[name][ym][String(d)] = bulkDays[d];
  closeModal('bulk-modal');
  renderAttTable();
  showToast(`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-2px;flex-shrink:0"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg> ${name} ${year}년 ${month}월 근태 저장 완료`);
  autoSave();
}

function exportAttExcel() {
  const year  = parseInt(document.getElementById('att-year').value);
  const month = parseInt(document.getElementById('att-month').value);
  const ym    = year + '_' + month;
  const lastDay = getDaysInMonth(year, month);
  const days  = Array.from({length: lastDay}, (_, i) => i + 1);
  const teamFilter = document.getElementById('att-team-filter')?.value || '';

  let emps = employees.filter(e => {
    if (teamFilter && e.team !== teamFilter) return false;
    if (e.leaveDate) {
      const ldY = parseInt(e.leaveDate.slice(0,4)), ldM = parseInt(e.leaveDate.slice(5,7));
      if (year > ldY || (year === ldY && month > ldM)) return false;
    }
    if (e.joinDate) {
      const jY = parseInt(e.joinDate.slice(0,4)), jM = parseInt(e.joinDate.slice(5,7));
      if (year < jY || (year === jY && month < jM)) return false;
    }
    return true;
  });

  const TEAM_ORDER = ['제휴상담 1팀','제휴상담 2팀','제휴상담 3팀','제휴지원팀',
    '장기사고 1팀','장기사고 2팀','장기사고 3팀','장기사고 4팀','장기사고 5팀','장기사고 6팀',
    '보유계약지원','실효OB','관리자'];
  emps.sort((a,b) => {
    const ai = TEAM_ORDER.indexOf(a.team), bi = TEAM_ORDER.indexOf(b.team);
    if (ai !== bi) return (ai===-1?99:ai) - (bi===-1?99:bi);
    return a.name.localeCompare(b.name,'ko');
  });

  const DOW = ['일','월','화','수','목','금','토'];
  const dayHeaders = days.map(d => `${d}(${DOW[new Date(year,month-1,d).getDay()]})`);
  const header = ['No','이름','사번','팀','입사일','전보일','퇴사일', ...dayHeaders, '출근','연차','반차','결근','청휴','병가','무급','공휴일','기타'];

  const dataRows = emps.map((e, idx) => {
    const row = [idx+1, e.name, e.empId||'', e.team, e.joinDate||'', e.transferDate||'', e.leaveDate||''];
    let cnt = {출근:0,연차:0,반차:0,결근:0,청휴:0,병가:0,무급휴가:0,공휴일:0,기타:0};

    days.forEach(d => {
      const dStr = `${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const raw  = attendance[e.name]?.[ym]?.[String(d)];
      const v    = raw && typeof raw === 'object' ? (raw.v||'') : (raw||'');
      const dow  = new Date(year, month-1, d).getDay();

      let cell = '';
      if (e.joinDate && dStr < e.joinDate) {
        cell = ''; // 입사 전
      } else if (e.leaveDate && dStr > e.leaveDate) {
        cell = ''; // 퇴사 후
      } else if (isOnLeaveHistory(e, year, month, d)) {
        // 휴직 중: 직접 입력값 무시하고 휴직 타입 표시
        const lh = (e.leaveHistory||[]).find(l => {
          if (!l.startDate) return false;
          const s = new Date(l.startDate.replace(/-/g,'/'));
          const en = l.endDate ? new Date(l.endDate.replace(/-/g,'/')) : new Date('9999/12/31');
          return new Date(year,month-1,d) >= s && new Date(year,month-1,d) <= en;
        });
        cell = lh?.type || '휴직';
      } else if (!v) {
        if (isHoliday(year,month,d)) cell = '공휴일';
        else if (dow===0) cell = '휴일';
        else if (dow===6) cell = '휴무';
        else cell = '○';
      } else {
        cell = v; // 메모 제외, 근태값만
      }
      row.push(cell);

      // cell 기준으로 집계 (입사전/퇴사후/휴직 등 이미 반영된 값)
      if (cell === '○') cnt['출근']++;
      else if (cell === '연차') cnt['연차']++;
      else if (cell === '반차') cnt['반차']++;
      else if (cell === '결근') cnt['결근']++;
      else if (cell === '청휴') cnt['청휴']++;
      else if (cell === '병가') cnt['병가']++;
      else if (cell === '무급휴가') cnt['무급휴가']++;
      else if (cell === '공휴일') cnt['공휴일']++;
      else if (!['휴일','휴무',''].includes(cell)) cnt['기타']++;
    });

    row.push(cnt['출근'],cnt['연차'],cnt['반차'],cnt['결근'],cnt['청휴'],cnt['병가'],cnt['무급휴가'],cnt['공휴일'],cnt['기타']);
    return row;
  });

  const ws = XLSX.utils.aoa_to_sheet([header, ...dataRows]);
  ws['!cols'] = [{wch:5},{wch:10},{wch:10},{wch:14},{wch:12},{wch:12},{wch:12},
    ...days.map(()=>({wch:6})),
    {wch:5},{wch:5},{wch:5},{wch:5},{wch:5},{wch:5},{wch:5},{wch:5},{wch:5}];

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, `${year}년${month}월 근태`);
  XLSX.writeFile(wb, `근태관리_${year}년${month}월.xlsx`);
  showToast(`✅ ${year}년 ${month}월 근태 엑셀 다운로드 완료`);
}
