// 급여테이블 데이터
function initIssueControls() {
  const ysel = document.getElementById('issue-year');
  const msel = document.getElementById('issue-month');
  if (!ysel || !msel) return;
  const now = new Date();
  for (let y = 2024; y <= 2028; y++) {
    const o = document.createElement('option');
    o.value = y; o.textContent = y+'년';
    if (y === now.getFullYear()) o.selected = true;
    ysel.appendChild(o);
  }
  for (let m = 1; m <= 12; m++) {
    const o = document.createElement('option');
    o.value = m; o.textContent = m+'월';
    if (m === now.getMonth()+1) o.selected = true;
    msel.appendChild(o);
  }
}
function loadIssueMemo() {
  const year  = parseInt(document.getElementById('issue-year')?.value)  || new Date().getFullYear();
  const month = parseInt(document.getElementById('issue-month')?.value) || new Date().getMonth()+1;
  const key = getIssueMemoKey(year, month);
  const textarea = document.getElementById('issue-memo-text');
  const view = document.getElementById('issue-memo-view');
  const st = document.getElementById('issue-memo-status');
  if (!textarea || !view) return;
  // issueMemos 전역 객체에서 불러오기
  const saved = (window.issueMemos && window.issueMemos[key]) || '';
  textarea.value = saved;
  view.textContent = saved || '(메모 없음)';
  view.style.color = saved ? 'var(--text)' : 'var(--text3)';
  if (st) st.textContent = saved ? '저장됨' : '';
  toggleIssueMemoEdit(false);
}

function toggleIssueMemoEdit(editMode) {
  const textarea = document.getElementById('issue-memo-text');
  const view     = document.getElementById('issue-memo-view');
  const editBtn  = document.getElementById('issue-memo-edit-btn');
  const saveBtn  = document.getElementById('issue-memo-save-btn');
  if (!textarea || !view) return;
  if (editMode) {
    textarea.style.display = 'block';
    view.style.display = 'none';
    editBtn.style.display = 'none';
    saveBtn.style.display = 'inline-flex';
    textarea.focus();
  } else {
    // 완료 → view 업데이트 후 읽기모드
    const val = textarea.value;
    view.textContent = val || '(메모 없음)';
    view.style.color = val ? 'var(--text)' : 'var(--text3)';
    textarea.style.display = 'none';
    view.style.display = 'block';
    editBtn.style.display = 'inline-flex';
    saveBtn.style.display = 'none';
  }
}
function saveIssueMemo() {
  const year  = parseInt(document.getElementById('issue-year')?.value)  || new Date().getFullYear();
  const month = parseInt(document.getElementById('issue-month')?.value) || new Date().getMonth()+1;
  const key = getIssueMemoKey(year, month);
  const el = document.getElementById('issue-memo-text');
  const st = document.getElementById('issue-memo-status');
  if (!el) return;
  if (st) st.textContent = '저장 중...';
  clearTimeout(_issueMemoTimer);
  _issueMemoTimer = setTimeout(() => {
    if (!window.issueMemos) window.issueMemos = {};
    window.issueMemos[key] = el.value;
    // DB에 notice 컬럼으로 저장
    dbSaveIssueMemo().then(() => {
      if (st) st.textContent = '✅ 저장됨: ' + new Date().toLocaleTimeString('ko-KR');
    }).catch(() => {
      if (st) st.textContent = '❌ 저장 실패';
    });
  }, 800);
}
function clearIssueMemo() {
  if (!confirm('이번달 메모를 삭제하시겠습니까?')) return;
  const year  = parseInt(document.getElementById('issue-year')?.value)  || new Date().getFullYear();
  const month = parseInt(document.getElementById('issue-month')?.value) || new Date().getMonth()+1;
  const key = getIssueMemoKey(year, month);
  if (!window.issueMemos) window.issueMemos = {};
  window.issueMemos[key] = '';
  dbSaveIssueMemo();
  const el   = document.getElementById('issue-memo-text');
  const view = document.getElementById('issue-memo-view');
  const st   = document.getElementById('issue-memo-status');
  if (el)   el.value = '';
  if (view) { view.textContent = '(메모 없음)'; view.style.color = 'var(--text3)'; }
  if (st)   st.textContent = '';
  toggleIssueMemoEdit(false);
}

function renderIssue() {
  const year  = parseInt(document.getElementById('issue-year').value)  || new Date().getFullYear();
  const month = parseInt(document.getElementById('issue-month').value) || new Date().getMonth()+1;
  const days  = getDaysInMonth(year, month);
  const ym1 = `${year}-${String(month).padStart(2,'0')}-01`;
  const ym2 = `${year}-${String(month).padStart(2,'0')}-${String(days).padStart(2,'0')}`;

  // 1. 입사자
  const joiners = employees.filter(e => e.joinDate >= ym1 && e.joinDate <= ym2);

  // 2. 퇴사자
  const leavers = employees.filter(e => e.leaveDate && e.leaveDate >= ym1 && e.leaveDate <= ym2);

  // 3. 휴직 중 (해당월 기간 겹치는 인원)
  const mStart = new Date(year, month-1, 1);
  const mEnd   = new Date(year, month-1, days);
  const onLeave = employees.filter(e => e.leaveHistory?.some(l => {
    if (!l.startDate) return false;
    const s = new Date(l.startDate.replace(/-/g,'/'));
    const en = l.endDate ? new Date(l.endDate.replace(/-/g,'/')) : new Date('9999/12/31');
    return s <= mEnd && en >= mStart;
  }));

  // 4. 육아단축 중
  const onParental = employees.filter(e => e.parentalLeave?.some(p => {
    if (!p.startDate) return false;
    const s = new Date(p.startDate.replace(/-/g,'/'));
    const en = p.endDate ? new Date(p.endDate.replace(/-/g,'/')) : new Date('9999/12/31');
    return s <= mEnd && en >= mStart;
  }));

  // 5. 특이근태 (연차·반차 제외) + 메모
  const specialTypes = ['결근','청휴','병가','무급휴가','보건','가족돌봄','공가','유급','배우자출산'];
  const specialUsers = [];
  employees.forEach(e => {
    const used = {};
    for (let d = 1; d <= days; d++) {
      const v = getAtt(e.name, year, month, d);
      if (specialTypes.includes(v)) {
        if (!used[v]) used[v] = [];
        const memo = getAttMemo(e.name, year, month, d);
        used[v].push({ d, memo });
      }
    }
    if (Object.keys(used).length) specialUsers.push({ e, used });
  });

  // 6. 결근자 + 메모
  const absentUsers = [];
  employees.forEach(e => {
    const absentDays = [];
    for (let d = 1; d <= days; d++) {
      if (getAtt(e.name, year, month, d) === '결근') {
        const memo = getAttMemo(e.name, year, month, d);
        absentDays.push({ d, memo });
      }
    }
    if (absentDays.length) absentUsers.push({ e, absentDays });
  });

  // 7. 정산대상자 (2주년 도래 + 이번달 퇴사자)
  const todayStr2 = new Date().toISOString().slice(0,10);
  const settlement = employees.filter(e => {
    const base = e.transferDate || e.joinDate;
    if (!base) return false;
    const bd = new Date(base.replace(/-/g,'/'));
    const is2yr = (bd.getFullYear()+2) === year && (bd.getMonth()+1) === month;
    // 이번달 퇴사자도 포함
    const isResignedThisMonth = e.leaveDate && e.leaveDate >= ym1 && e.leaveDate <= ym2;
    return is2yr || isResignedThisMonth;
  });

  // ── 렌더 헬퍼 ──
  const emptyMsg = `<div class="issue-empty">해당 없음</div>`;

  let _issueSectionIdx = 0;
  const section = (icon, title, cnt, content) => {
    const id = 'issue-sec-' + (_issueSectionIdx++);
    const hasData = cnt > 0;
    return `
    <div class="issue-section">
      <div class="issue-section-title" onclick="toggleIssueSection('${id}')" style="cursor:pointer;user-select:none;justify-content:space-between;${hasData?'':'opacity:0.6;'}">
        <span>${icon} ${title} <span class="issue-count">${cnt}명</span></span>
        <span id="${id}-arrow" style="font-size:12px;color:var(--text3);transition:transform .2s;${hasData?'':'transform:rotate(-90deg);'}">▼</span>
      </div>
      <div id="${id}" style="display:${hasData?'block':'none'};">
        <div class="card" style="overflow:hidden;">${content}</div>
      </div>
    </div>`;
  };

  // 입사자
  const joinHtml = joiners.length ? `<table class="issue-table">
    <thead><tr><th>성명</th><th>팀</th><th>사번</th><th>입사일</th></tr></thead><tbody>
    ${joiners.map(e=>`<tr><td style="font-weight:700">${e.name}</td><td>${getTeamBadge(e.team,'font-size:10px;')}</td><td style="font-size:11px;color:var(--text2)">${e.empId||'-'}</td><td style="font-size:11px">${e.joinDate}</td></tr>`).join('')}
    </tbody></table>` : emptyMsg;

  // 퇴사자
  const leaveHtml = leavers.length ? `<table class="issue-table">
    <thead><tr><th>성명</th><th>팀</th><th>사번</th><th>퇴사일</th></tr></thead><tbody>
    ${leavers.map(e=>`<tr><td style="font-weight:700">${e.name}</td><td>${getTeamBadge(e.team,'font-size:10px;')}</td><td style="font-size:11px;color:var(--text2)">${e.empId||'-'}</td><td style="font-size:11px;color:var(--danger)">${e.leaveDate}</td></tr>`).join('')}
    </tbody></table>` : emptyMsg;

  // 휴직 중
  // 날짜가 이번달인지 체크하는 헬퍼
  const isThisMonth = d => d && d >= ym1 && d <= ym2;
  const dateStyle = d => isThisMonth(d)
    ? 'font-size:11px;color:var(--danger);font-weight:700;'
    : 'font-size:11px;';

  const onLeaveHtml = onLeave.length ? `<table class="issue-table">
    <thead><tr><th>성명</th><th>팀</th><th>사번</th><th>휴직구분</th><th>시작일</th><th>종료일</th></tr></thead><tbody>
    ${onLeave.map(e => {
      const l = e.leaveHistory.find(l => {
        if (!l.startDate) return false;
        const s = new Date(l.startDate.replace(/-/g,'/')), en = l.endDate ? new Date(l.endDate.replace(/-/g,'/')) : new Date('9999/12/31');
        return s <= mEnd && en >= mStart;
      });
      return `<tr><td style="font-weight:700">${e.name}</td><td>${getTeamBadge(e.team,'font-size:10px;')}</td><td style="font-size:11px;color:var(--text2)">${e.empId||'-'}</td><td><span class="badge badge-orange" style="font-size:10px">${l?.type||'-'}</span></td><td style="${dateStyle(l?.startDate)}">${l?.startDate||'-'}</td><td style="${dateStyle(l?.endDate)}">${l?.endDate||'진행중'}</td></tr>`;
    }).join('')}
    </tbody></table>` : emptyMsg;

  // 육아단축
  const parentalHtml = onParental.length ? `<table class="issue-table">
    <thead><tr><th>성명</th><th>팀</th><th>사번</th><th>단축시간</th><th>시작일</th><th>종료일</th></tr></thead><tbody>
    ${onParental.map(e => {
      const p = e.parentalLeave.find(p => {
        if (!p.startDate) return false;
        const s = new Date(p.startDate.replace(/-/g,'/')), en = p.endDate ? new Date(p.endDate.replace(/-/g,'/')) : new Date('9999/12/31');
        return s <= mEnd && en >= mStart;
      });
      return `<tr><td style="font-weight:700">${e.name}</td><td>${getTeamBadge(e.team,'font-size:10px;')}</td><td style="font-size:11px;color:var(--text2)">${e.empId||'-'}</td><td><span class="parental-badge">하루 ${p?.hours||'-'}h</span></td><td style="${dateStyle(p?.startDate)}">${p?.startDate||'-'}</td><td style="${dateStyle(p?.endDate)}">${p?.endDate||'진행중'}</td></tr>`;
    }).join('')}
    </tbody></table>` : emptyMsg;

  // 특이근태
  const specialHtml = specialUsers.length ? `<table class="issue-table">
    <thead><tr><th>성명</th><th>팀</th><th>사번</th><th>구분</th><th>날짜</th><th>메모</th></tr></thead><tbody>
    ${specialUsers.map(({e,used}) => Object.entries(used).map(([type,items]) =>
      `<tr><td style="font-weight:700">${e.name}</td><td>${getTeamBadge(e.team,'font-size:10px;')}</td><td style="font-size:11px;color:var(--text2)">${e.empId||'-'}</td><td><span class="att-cell ${ATT_CLASS[type]||''}" style="cursor:default;font-size:10px;width:auto;padding:2px 8px;">${type}</span></td><td style="font-size:11px;color:var(--text2)">${items.map(x=>x.d+'일').join(', ')}</td><td style="font-size:11px;color:var(--text3)">${items.filter(x=>x.memo).map(x=>x.d+'일: '+x.memo).join(' / ')||'-'}</td></tr>`
    ).join('')).join('')}
    </tbody></table>` : emptyMsg;

  // 결근
  const absentHtml = absentUsers.length ? `<table class="issue-table">
    <thead><tr><th>성명</th><th>팀</th><th>사번</th><th>결근일</th><th>횟수</th><th>메모</th></tr></thead><tbody>
    ${absentUsers.map(({e,absentDays}) =>
      `<tr><td style="font-weight:700">${e.name}</td><td>${getTeamBadge(e.team,'font-size:10px;')}</td><td style="font-size:11px;color:var(--text2)">${e.empId||'-'}</td><td style="font-size:11px;color:var(--danger)">${absentDays.map(x=>x.d+'일').join(', ')}</td><td style="text-align:center;font-weight:700;color:var(--danger)">${absentDays.length}회</td><td style="font-size:11px;color:var(--text3)">${absentDays.filter(x=>x.memo).map(x=>x.d+'일: '+x.memo).join(' / ')||'-'}</td></tr>`
    ).join('')}
    </tbody></table>` : emptyMsg;

  // 정산대상자 (2주년 + 이번달 퇴사자)
  const settlementHtml = settlement.length ? `<table class="issue-table">
    <thead><tr><th>성명</th><th>팀</th><th>사번</th><th>기준일</th><th>발생연차</th><th>사용연차</th><th>잔여연차</th><th>비고</th></tr></thead><tbody>
    ${settlement.map(e => {
      const isActResigned = e.leaveDate && e.leaveDate <= new Date().toISOString().slice(0,10);
      const isResignedThis = e.leaveDate && e.leaveDate >= ym1 && e.leaveDate <= ym2;
      const base = e.transferDate || e.joinDate;
      const bd = new Date(base.replace(/-/g,'/'));
      const is2yr = (bd.getFullYear()+2) === year && (bd.getMonth()+1) === month;

      // refDate 결정:
      // - 퇴사자 → 퇴사일 기준
      // - 2주년 도래 재직자 → 2주년 도래일 전날 기준 (정산 시점)
      let refDate = null;
      let refLabel = '오늘';
      if (isActResigned) {
        refDate = e.leaveDate;
        refLabel = '퇴사일';
      } else if (is2yr) {
        const anniv2 = new Date(bd); anniv2.setFullYear(bd.getFullYear()+2);
        anniv2.setDate(anniv2.getDate()-1); // 도래일 전날
        refDate = anniv2.toISOString().slice(0,10);
        refLabel = '2주년 전날';
      }

      const lv = calcAnnualLeave(e, year, refDate);
      const badge = isResignedThis
        ? `<span class="badge badge-red" style="font-size:10px;">퇴사(${e.leaveDate})</span>`
        : `<span class="settlement-badge" title="${refDate||'오늘'} 기준"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-2px;flex-shrink:0"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> 2주년</span>`;
      const isLow = lv && lv.remain <= 3 && lv.granted > 0;
      return `<tr${isResignedThis?' style="background:#fafafa;"':''}>
        <td style="font-weight:700">${e.name}</td>
        <td>${getTeamBadge(e.team,'font-size:10px;')}</td>
        <td style="font-size:11px;color:var(--text2)">${e.empId||'-'}</td>
        <td style="font-size:11px">${base}<br><span style="font-size:10px;color:var(--text3)">(${refLabel} 기준)</span></td>
        <td style="font-weight:700;color:var(--accent)">${lv?.granted||'-'}일 (${lv?.grantedHours||'-'}h)</td>
        <td style="text-align:center;color:var(--text2)">${lv?.totalUsed||'0'}일 (${lv?.usedHours||'0'}h)</td>
        <td style="text-align:center;font-weight:700;color:${isLow?'var(--danger)':'var(--accent)'}">${lv?.remain||'0'}일 (${lv?.remainHours||'0'}h)</td>
        <td>${badge}</td>
      </tr>`;
    }).join('')}
    </tbody></table>` : emptyMsg;

  document.getElementById('issue-wrap').innerHTML = `

function initCertControls() {
  // 초기 연도 셀렉트는 비워둠 - 직원 선택 시 updateCertRefOptions에서 채움
  document.getElementById('cert-ref-type').addEventListener('change', function() {
    document.getElementById('cert-ref-year').style.display =
      this.value === 'fiscal' ? '' : 'none';
  });
}

// 직원 근속에 따라 선택 가능한 기준 옵션 업데이트
function updateCertRefOptions(emp) {
  const sel  = document.getElementById('cert-ref-type');
  const ysel = document.getElementById('cert-ref-year');
  const today = new Date(); today.setHours(0,0,0,0);
  const baseD = new Date((emp.transferDate || emp.joinDate).replace(/-/g,'/'));
  const anniv1 = new Date(baseD); anniv1.setFullYear(baseD.getFullYear()+1);
  const anniv2 = new Date(baseD); anniv2.setFullYear(baseD.getFullYear()+2);
  const anniv2Year = anniv2.getFullYear();
  const has1yr = anniv1 <= today;
  const has2yr = anniv2 <= today;

  const curVal = sel.value;
  sel.innerHTML = '';

  // 항상: 현재 기준
  sel.add(new Option('현재 기준 (오늘)', 'today'));

  // 1주년 이상: 1→2년차 정산
  if (has1yr) {
    const prev = new Date(anniv2); prev.setDate(prev.getDate()-1);
    sel.add(new Option(`2년차 정산 기준 (${prev.toISOString().slice(0,10)})`, 'anniv2'));
  }

  // 2주년 이상: 비례연차 정산 + 회계연도
  if (has2yr) {
    sel.add(new Option(`비례연차 정산 기준 (${anniv2Year}-12-31)`, 'proportional'));
    sel.add(new Option('회계연도 정산 기준', 'fiscal'));

    // 회계연도 연도 범위: 2주년 도래 연도 ~ 올해 (이미 채워져 있으면 스킵)
    const nowY = new Date().getFullYear();
    if (ysel.children.length === 0 || parseInt(ysel.options[0]?.value) !== anniv2Year) {
      const prevYearVal = ysel.value;
      ysel.innerHTML = '';
      for (let y = anniv2Year; y <= nowY; y++) {
        const o = document.createElement('option');
        o.value = y; o.textContent = y+'년';
        ysel.appendChild(o);
      }
      // 이전 선택값 복원 (범위 내에 있으면)
      const yOpts = [...ysel.options].map(o => o.value);
      ysel.value = yOpts.includes(prevYearVal) ? prevYearVal : String(nowY);
    }
  }

  // 이전 선택값 유지
  const opts = [...sel.options].map(o => o.value);
  sel.value = opts.includes(curVal) ? curVal : 'today';
  document.getElementById('cert-ref-year').style.display =
    sel.value === 'fiscal' ? '' : 'none';
}

function renderCert() {
  const q = (document.getElementById('cert-search').value || '').trim();
  const year = new Date().getFullYear();
  const refType  = document.getElementById('cert-ref-type')?.value || 'today';
  const refYear  = parseInt(document.getElementById('cert-ref-year')?.value) || year;
  const wrap = document.getElementById('cert-wrap');

  if (!q) {
    wrap.innerHTML = `<div style="text-align:center;padding:60px 20px;color:var(--text3);">
      <div style="font-size:36px;margin-bottom:12px;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-2px;flex-shrink:0"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div>
      <div style="font-size:14px;">이름 또는 사번을 검색하세요.</div>
    </div>`;
    return;
  }

  const matched = employees.filter(e =>
    e.name.includes(q) || e.empId.includes(q)
  );

  if (!matched.length) {
    wrap.innerHTML = `<div style="text-align:center;padding:60px 20px;color:var(--text3);font-size:14px;">검색 결과가 없습니다.</div>`;
    return;
  }

  // 첫 번째 매칭 직원 기준으로 기준 옵션 업데이트
  updateCertRefOptions(matched[0]);

  // 옵션 업데이트 후 다시 읽기
  const refTypeFinal = document.getElementById('cert-ref-type')?.value || 'today';
  const refYearFinal = parseInt(document.getElementById('cert-ref-year')?.value) || year;

  wrap.innerHTML = matched.map(emp => buildCertCard(emp, year, refTypeFinal, refYearFinal)).join('<div style="height:32px;"></div>');
}

function buildCertCard(emp, year, refType='today', refYear=null) {
  const today = new Date(); today.setHours(0,0,0,0);
  const isActuallyResigned = emp.leaveDate && emp.leaveDate <= today.toISOString().slice(0,10);
  const baseD = emp.transferDate ? new Date(emp.transferDate.replace(/-/g,'/')) : new Date(emp.joinDate.replace(/-/g,'/'));

  // ── 기준일 계산 ──
  let refDate = null;      // calcAnnualLeave에 넘길 기준일
  let calcYear = year;     // 연차 계산 대상 연도
  let refLabel = '오늘 기준';

  if (isActuallyResigned) {
    // 퇴사자는 항상 퇴사일 기준
    refDate = emp.leaveDate;
    refLabel = `퇴사일 기준 (${emp.leaveDate})`;
  } else if (refType === 'anniv2') {
    // 2주년 도래일 전날
    const anniv2 = new Date(baseD); anniv2.setFullYear(baseD.getFullYear()+2);
    anniv2.setDate(anniv2.getDate()-1);
    refDate = anniv2.toISOString().slice(0,10);
    calcYear = anniv2.getFullYear();
    refLabel = `1→2년차 정산 기준 (${refDate}, 2주년 전날)`;
  } else if (refType === 'proportional') {
    // 비례연차 정산 기준 = 비례연차 발생 연도(2주년 도래 연도) 12/31
    const anniv2 = new Date(baseD); anniv2.setFullYear(baseD.getFullYear()+2);
    calcYear = anniv2.getFullYear();
    refDate  = `${calcYear}-12-31`;
    refLabel = `비례연차 정산 기준 (${calcYear}-12-31, 비례연차 발생 연도말)`;
  } else if (refType === 'fiscal') {
    // 선택 연도 12/31 기준
    const fiscalY = refYear || year;
    refDate = `${fiscalY}-12-31`;
    calcYear = fiscalY;
    refLabel = `${fiscalY}년 회계연도 정산 기준 (${fiscalY}-12-31)`;
  } else {
    // 오늘 기준
    refLabel = `오늘 기준 (${today.toISOString().slice(0,10)})`;
  }

  const lv = calcAnnualLeave(emp, calcYear, refDate);
  const tenure = calcTenure(emp);
  const baseLabel = emp.transferDate ? '전보일' : '입사일';
  const baseDate  = emp.transferDate || emp.joinDate;

  // ── 연차/반차 상세 사용 내역 수집 ──
  const annualList = [];
  const halfList   = [];
  const absentList = [];

  // 2년 미만자 여부 판단
  const baseD2 = baseD;
  const anniv2forCert = new Date(baseD2); anniv2forCert.setFullYear(baseD2.getFullYear()+2);
  anniv2forCert.setHours(0,0,0,0);
  const todayCert = refDate ? new Date(refDate.replace(/-/g,'/')) : new Date(); todayCert.setHours(0,0,0,0);
  const isUnder2yr = anniv2forCert > todayCert;
  // 2주년 미도래 = 1년차 유지 = 결근 내역 표시 대상
  const is1YrUnder = isUnder2yr;

  // 사용 내역 수집 범위
  const collectStartYear = isUnder2yr ? baseD2.getFullYear() : calcYear;
  const collectEndYear   = calcYear;

  for (let y = collectStartYear; y <= collectEndYear; y++) {
    for (let m = 1; m <= 12; m++) {
      const days = getDaysInMonth(y, m);
      for (let d = 1; d <= days; d++) {
        const cur = new Date(y, m-1, d);
        // 입사일 이전 스킵
        if (cur < baseD2) continue;
        // 오늘 이후 스킵
        if (cur > todayCert) break;
        // 비례연차 대상자는 2주년 이후만
        if (lv && lv.isProportional && cur < anniv2forCert) continue;

        const v = getAtt(emp.name, y, m, d);
        const memo = getAttMemo(emp.name, y, m, d);
        const ph = getParentalHours(emp, y, m, d);
        const hrs = ph !== null ? ph : 8;
        const dateStr = `${y}.${String(m).padStart(2,'0')}.${String(d).padStart(2,'0')}`;
        const dayNames = ['일','월','화','수','목','금','토'];
        const dow = dayNames[new Date(y,m-1,d).getDay()];
        if (v === '연차') annualList.push({ dateStr, dow, hrs, memo });
        else if (v === '반차') halfList.push({ dateStr, dow, hrs: hrs/2, memo });
        else if (v === '결근' && is1YrUnder) absentList.push({ dateStr, dow, memo });
      }
    }
  }

  const totalUsedH = annualList.reduce((s,x)=>s+x.hrs,0) + halfList.reduce((s,x)=>s+x.hrs,0);

  // ── 기본 정보 행 ──
  const infoRows = [
    ['성명', emp.name],
    ['사번', emp.empId||'-'],
    ['팀 / 업무', `${emp.team} / ${emp.job||'-'}`],
    [baseLabel, baseDate||'-'],
    ...(emp.transferDate ? [['입사일', emp.joinDate||'-']] : []),
    ['근속기간', `${tenure}개월`],
    ...(isActuallyResigned ? [['퇴사일', emp.leaveDate]] : []),
  ].map(([k,v]) => `
    <tr>
      <td style="background:var(--surface2);font-weight:600;color:var(--text2);width:110px;padding:8px 14px;font-size:12px;white-space:nowrap;">${k}</td>
      <td style="padding:8px 14px;font-size:13px;">${v}</td>
    </tr>`).join('');

  // ── 연차 현황 행 ──
  const lvGranted  = lv ? `${lv.granted}일 (${lv.grantedHours}h) · ${lv.grantType}` : '-';
  const lvUsed     = lv ? `${lv.totalUsed}일 (${totalUsedH}h) · 연차 ${annualList.length}회 / 반차 ${halfList.length}회` : '-';
  const lvRemain   = lv ? `${lv.remain}일 (${lv.remainHours}h)` : '-';
  const isLow      = lv && lv.remain <= 3 && lv.granted > 0;

  // ── 2년 미만자: 예상 비례연차 (현재 기준 조회일 때만 표시) ──
  let nextPropRow = '';
  if (isUnder2yr && !isActuallyResigned && refType === 'today') {
    // 2주년 도래일
    const anniv2Date = anniv2forCert;
    const anniv2Str  = `${anniv2Date.getFullYear()}-${String(anniv2Date.getMonth()+1).padStart(2,'0')}-${String(anniv2Date.getDate()).padStart(2,'0')}`;
    // 비례연차 계산: ceil(15/365 × 남은일수(도래일~12/31) × 8h)
    const yearEnd = new Date(anniv2Date.getFullYear(), 11, 31);
    const remainDays = Math.floor((yearEnd - anniv2Date) / 86400000) + 1;
    const propH = Math.ceil(15 / 365 * remainDays * 8);
    const propD = Math.round(propH / 8 * 10) / 10;
    // 실효OB 팀은 별도 공식
    const propDisplay = emp.team === '실효OB'
      ? `${Math.ceil(propH / 209 * 84)}h (실효OB 환산)`
      : `${propD}일 (${propH}h)`;

    nextPropRow = `
    <tr>
      <td style="background:#f0fff4;font-weight:700;color:#2a9a6e;width:110px;padding:8px 14px;font-size:12px;white-space:nowrap;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-2px;flex-shrink:0"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> 예상 비례연차</td>
      <td style="padding:8px 14px;font-size:13px;color:#2a9a6e;font-weight:600;">${propDisplay} <span style="font-size:11px;font-weight:400;color:var(--text3);">— ${anniv2Str} (2주년) 도래 시 발생</span></td>
    </tr>`;
  }

  const leaveRows = [
    ['발생 연차', lvGranted, ''],
    ['사용 연차', lvUsed, ''],
    ['잔여 연차', lvRemain, isLow ? 'color:var(--danger);font-weight:700;' : 'color:var(--accent);font-weight:700;'],
  ].map(([k,v,s]) => `
    <tr>
      <td style="background:var(--accent-light);font-weight:700;color:var(--accent);width:110px;padding:8px 14px;font-size:12px;white-space:nowrap;">${k}</td>
      <td style="padding:8px 14px;font-size:13px;${s}">${v}</td>
    </tr>`).join('') + nextPropRow;

  // ── 상세 내역 테이블 ──
  function detailTable(title, icon, list, isHalf) {
    if (!list.length) return `<div style="font-size:12px;color:var(--text3);padding:6px 0;">${icon} ${title} 사용 내역이 없습니다.</div>`;
    const rows = list.map(x => `
      <tr style="border-bottom:1px solid var(--border);">
        <td style="padding:7px 12px;font-size:12px;font-weight:600;">${x.dateStr}</td>
        <td style="padding:7px 12px;font-size:12px;color:var(--text2);">${x.dow}요일</td>
        <td style="padding:7px 12px;font-size:12px;text-align:center;font-weight:700;color:var(--accent);">${x.hrs}h</td>
        <td style="padding:7px 12px;font-size:12px;color:var(--text2);">${x.memo||''}</td>
      </tr>`).join('');
    const total = list.reduce((s,x)=>s+x.hrs,0);
    return `
      <div style="font-size:12px;font-weight:700;color:var(--text);margin:14px 0 6px;display:flex;align-items:center;gap:6px;">
        ${icon} ${title} <span style="font-size:11px;font-weight:400;color:var(--text3)">(${list.length}회 · ${total}h)</span>
      </div>
      <table style="width:100%;border-collapse:collapse;border:1px solid var(--border);border-radius:8px;overflow:hidden;">
        <thead>
          <tr style="background:var(--surface2);">
            <th style="padding:7px 12px;text-align:left;font-size:11px;color:var(--text2);font-weight:700;border-bottom:2px solid var(--border);">날짜</th>
            <th style="padding:7px 12px;text-align:left;font-size:11px;color:var(--text2);font-weight:700;border-bottom:2px solid var(--border);">요일</th>
            <th style="padding:7px 12px;text-align:center;font-size:11px;color:var(--text2);font-weight:700;border-bottom:2px solid var(--border);">시간</th>
            <th style="padding:7px 12px;text-align:left;font-size:11px;color:var(--text2);font-weight:700;border-bottom:2px solid var(--border);">메모</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  function absentTable(list) {
    if (!list.length) return '';
    const rows = list.map(x => `
      <tr style="border-bottom:1px solid var(--border);">
        <td style="padding:7px 12px;font-size:12px;font-weight:600;">${x.dateStr}</td>
        <td style="padding:7px 12px;font-size:12px;color:var(--text2);">${x.dow}요일</td>
        <td style="padding:7px 12px;font-size:12px;color:var(--danger);font-weight:700;">결근</td>
        <td style="padding:7px 12px;font-size:12px;color:var(--text2);">${x.memo||''}</td>
      </tr>`).join('');
    return `
      <div style="font-size:12px;font-weight:700;color:var(--danger);margin:14px 0 6px;display:flex;align-items:center;gap:6px;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-2px;flex-shrink:0"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg> 결근 내역 <span style="font-size:11px;font-weight:400;color:var(--text3)">(${list.length}회 · 연차 미발생 영향)</span>
      </div>
      <table style="width:100%;border-collapse:collapse;border:1px solid #ffcccc;border-radius:8px;overflow:hidden;">
        <thead>
          <tr style="background:#fff0f0;">
            <th style="padding:7px 12px;text-align:left;font-size:11px;color:var(--danger);font-weight:700;border-bottom:2px solid #ffcccc;">날짜</th>
            <th style="padding:7px 12px;text-align:left;font-size:11px;color:var(--danger);font-weight:700;border-bottom:2px solid #ffcccc;">요일</th>
            <th style="padding:7px 12px;text-align:left;font-size:11px;color:var(--danger);font-weight:700;border-bottom:2px solid #ffcccc;">구분</th>
            <th style="padding:7px 12px;text-align:left;font-size:11px;color:var(--danger);font-weight:700;border-bottom:2px solid #ffcccc;">메모</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  return `
    <div class="cert-card" style="background:var(--surface);border:1.5px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:var(--shadow-md);max-width:700px;margin:0 auto;">
      <!-- 헤더 -->
      <div style="background:linear-gradient(135deg,var(--accent-light),#eff4ff);padding:18px 24px;border-bottom:2px solid var(--border);display:flex;align-items:center;justify-content:space-between;">
        <div>

function printCert() {
  document.body.classList.add('printing-cert');
  window.print();
  document.body.classList.remove('printing-cert');
}

// ══════════════════════════════
//  JSON 내보내기 / 불러오기
// ══════════════════════════════
// 읽기전용 상태
let isReadOnly = false;
let _readOnlyHash = null; // 저장된 해시

// 간단한 해시 (비밀번호 → 숫자 문자열)
async function hashPw(pw) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

function exportData() {
  document.getElementById('export-pw').value = '';
  document.getElementById('export-pw-modal').classList.add('show');
}

async function doExport() {
  const pw = document.getElementById('export-pw').value;
  const now = new Date();
  const stamp = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}`;

  const data = {
    version: 1,
    exportedAt: now.toISOString(),
    employees,
    attendance,
    payrollManual,
  };

  if (pw) {
    // 비밀번호 있음 → 읽기전용
    const hash = await hashPw(pw);
    data.readonly = true;
    data.pwHash = hash;
  }

  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `근태관리_${stamp}${pw ? '_readonly' : ''}.json`;
  a.click();
  URL.revokeObjectURL(url);
  closeModal('export-pw-modal');
  showToast(pw ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-2px;flex-shrink:0"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> 읽기전용 파일로 내보냈습니다.' : '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-2px;flex-shrink:0"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg> 내보내기 완료!');
}

function importData() {
  document.getElementById('import-file').value = '';
  document.getElementById('import-file').click();
}

function handleImportFile(event) {
  const file = event.target.files[0];
  if (!file) return;

  // HTML 파일이면 새 탭에서 열기
  if (file.name.endsWith('.html')) {
    const url = URL.createObjectURL(file);
    window.location.href = url;
    return;
  }

  // JSON 파일 처리 (기존)
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.employees || !Array.isArray(data.employees)) {
        showToast('올바른 근태관리 파일이 아닙니다.', true); return;
      }
      showConfirm('데이터 불러오기',
        `"${file.name}" 파일을 불러옵니다.\n현재 데이터가 모두 이 파일의 데이터로 교체됩니다.`,
        () => {
          employees = data.employees;
          attendance = data.attendance || {};
          if (data.payrollManual) payrollManual = data.payrollManual;
          populateTeamFilter();
          populateAttTeamFilter();
          renderEmpTable();
          // 읽기전용 여부 적용
          if (data.readonly && data.pwHash) {
            setReadOnly(true, data.pwHash);
            showToast(`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-2px;flex-shrink:0"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> 읽기전용 모드로 불러왔습니다. 편집하려면 <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-2px;flex-shrink:0"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> 버튼을 누르세요.`);
          } else {
            setReadOnly(false, null);
            saveData();
            showToast(`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-2px;flex-shrink:0"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg> ${employees.length}명 데이터를 불러왔습니다.`);
          }
        }
      );
    } catch {
      showToast('파일을 읽는 중 오류가 발생했습니다.', true);
    }
  };
  reader.readAsText(file);
}

function setReadOnly(val, hash) {
  isReadOnly = val;
  _readOnlyHash = hash || null;

  // 잠금 버튼 표시/숨김
  const lockBtn = document.getElementById('lock-btn');
  if (lockBtn) lockBtn.style.display = val ? 'inline-flex' : 'none';

  // 저장 버튼 숨김
  const saveBtn = document.getElementById('manual-save-btn');
  if (saveBtn) saveBtn.style.display = val ? 'none' : '';

  // 저장 상태 텍스트
  const status = document.getElementById('save-status');
  if (status) status.innerHTML = val ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-2px;flex-shrink:0"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> 읽기전용 모드' : '변경 시 자동저장';

  // 편집 버튼들 비활성화/활성화
  const editSelectors = [
    '.btn-add', '.btn-warn', '[onclick*="openEditEmpModal"]',
    '[onclick*="openAttModal"]', '[onclick*="openBulkModal"]',
    '[onclick*="deleteEmp"]', '[onclick*="resetEmpData"]',
    '[onclick*="confirmResetMonthAtt"]', '#att-sort',
  ];
  // CSS 클래스로 일괄 처리
  document.body.classList.toggle('readonly-mode', val);
}

function toggleLock() {
  document.getElementById('unlock-pw').value = '';
  document.getElementById('unlock-error').style.display = 'none';
  document.getElementById('unlock-modal').classList.add('show');
}

async function doUnlock() {
  const pw = document.getElementById('unlock-pw').value;
  if (!pw) return;
  const hash = await hashPw(pw);
  if (hash === _readOnlyHash) {
    setReadOnly(false, null);
    closeModal('unlock-modal');
    saveData();
    showToast('<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-2px;flex-shrink:0"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg> 편집 모드로 전환되었습니다.');
  } else {
    document.getElementById('unlock-error').style.display = 'block';
  }
}

// ══════════════════════════════
//  초기화
// ══════════════════════════════
// ══════════════════════════════
//  권한 시스템
// ══════════════════════════════
const PW_MASTER_HASH = 'debd5f44db8beeea9694ff3048a64a956e36ba71f70b944cdebd19b2e2d6849e'; // tvxq0507**

let currentMode = 'view'; // 기본: 열람모드

async function hashPw(pw) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

// 관리자 전환 버튼 클릭 → 비밀번호 입력 팝업
function switchToAdmin() {
  if (currentMode === 'admin') {
    // 관리자 → 열람으로 전환
    currentMode = 'view';
    try { sessionStorage.removeItem('att_mode'); } catch(e) {}
    applyMode('view');
    return;
  }
  // 관리자 비밀번호 입력 모달 표시
  document.getElementById('admin-login-modal').classList.add('show');
  setTimeout(() => document.getElementById('admin-pw-input').focus(), 100);
}

async function tryAdminLogin() {
  const pw = document.getElementById('admin-pw-input').value;
  const errEl = document.getElementById('admin-pw-error');
  if (!pw) { errEl.textContent = '비밀번호를 입력해주세요.'; return; }

  const hashed = await hashPw(pw);
  const adminHash = localStorage.getItem('att_pw_admin') || '5b697282df7a44230864437a0821d72986f8406b769c9a1797bad56e269ffb7a';

  if (hashed === adminHash || hashed === PW_MASTER_HASH) {
    currentMode = 'admin';
    try { sessionStorage.setItem('att_mode', 'admin'); } catch(e) {}
    applyMode('admin');
    closeModal('admin-login-modal');
    document.getElementById('admin-pw-input').value = '';
    errEl.textContent = '';
    showToast('✅ 관리자 모드로 전환됐습니다.');
  } else {
    errEl.textContent = '❌ 비밀번호가 올바르지 않습니다.';
    document.getElementById('admin-pw-input').value = '';
    document.getElementById('admin-pw-input').focus();
    setTimeout(() => errEl.textContent = '', 2000);
  }
}

function applyMode(mode) {
  const isAdmin = mode === 'admin';
  const badge = document.getElementById('mode-badge');
  const switchBtn = document.getElementById('mode-switch-btn');

  // 배지
  if (badge) {
    badge.style.display = 'inline';
    if (isAdmin) {
      badge.textContent = '관리자';
      badge.style.background = '#1d4ed8';
      badge.style.color = '#fff';
    } else {
      badge.textContent = '열람';
      badge.style.background = '#e2e8f0';
      badge.style.color = '#64748b';
    }
  }

  // 설정 메뉴 내 전환 버튼 텍스트
  const menuSwitchBtn = document.getElementById('menu-switch-btn');
  if (menuSwitchBtn) {
    menuSwitchBtn.innerHTML = isAdmin
      ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg> 열람으로 전환'
      : '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> 관리자 전환';
  }

  // 관리자 전용 메뉴 표시/숨김
  const adminMenu = document.getElementById('menu-admin-only');
  if (adminMenu) adminMenu.style.display = isAdmin ? 'block' : 'none';

  // body에 모드 클래스 적용 → CSS로 일괄 차단
  document.body.classList.toggle('view-mode', !isAdmin);
  document.body.classList.toggle('admin-mode', isAdmin);

  // 수정 버튼 data-view-blocked (동적 생성 버튼용 fallback)
  const editSelectors = [
    '.btn-save', '.btn-warn', '.btn-add',
    'button[onclick*="openPasteModal"]',
    'button[onclick*="confirmReset"]',
    'button[onclick*="saveIssueMemo"]',
    'button[onclick*="clearIssueMemo"]',
    'button[onclick*="toggleIssueMemoEdit"]',
    '#issue-memo-edit-btn',
    '#issue-memo-save-btn',
  ];
  document.querySelectorAll(editSelectors.join(',')).forEach(el => {
    const oc = el.getAttribute('onclick') || '';
    if (oc.includes('saveAsHtml') || oc.includes('exportAtt') || el.id === 'manual-save-btn') return;
    if (oc.includes('closeNotice') || oc.includes('tryAdminLogin') || oc.includes('closeModal') || oc.includes('saveNewPassword')) return;
    if (isAdmin) el.removeAttribute('data-view-blocked');
    else el.setAttribute('data-view-blocked', '1');
  });

  // 이달의이슈 메모 영역
  const memoSection = document.getElementById('issue-memo-section');
  if (memoSection) memoSection.style.display = isAdmin ? '' : 'none';
}

function toggleSettingsMenu() {
  const menu = document.getElementById('settings-menu');
  if (!menu) return;
  const isOpen = menu.style.display !== 'none';
  menu.style.display = isOpen ? 'none' : 'block';
  if (!isOpen) {
    // 외부 클릭 시 닫기
    setTimeout(() => {
      document.addEventListener('click', function closeMenu(e) {
        if (!document.getElementById('settings-wrap')?.contains(e.target)) {
          menu.style.display = 'none';
          document.removeEventListener('click', closeMenu);
        }
      });
    }, 10);
  }
}
function openChangePwModal() {
  if (!isAdminMode()) return;
  document.getElementById('cpw-master').value = '';
  document.getElementById('cpw-new').value = '';
  document.getElementById('cpw-confirm').value = '';
  document.getElementById('cpw-error').textContent = '';
  document.getElementById('changepw-modal').classList.add('show');
  setTimeout(() => document.getElementById('cpw-master').focus(), 100);
}


async function saveNewPassword() {
  const masterPw = document.getElementById('cpw-master').value;
  const newPw    = document.getElementById('cpw-new').value;
  const confirmPw = document.getElementById('cpw-confirm').value;
  const errEl    = document.getElementById('cpw-error');

  if (!masterPw) { errEl.textContent = '마스터 비밀번호를 입력해주세요.'; return; }
  const masterHashed = await hashPw(masterPw);
  if (masterHashed !== PW_MASTER_HASH) { errEl.textContent = '❌ 마스터 비밀번호가 올바르지 않습니다.'; return; }

  if (!newPw) { errEl.textContent = '새 비밀번호를 입력해주세요.'; return; }
  if (newPw.length < 4) { errEl.textContent = '비밀번호는 4자 이상 입력해주세요.'; return; }
  if (newPw !== confirmPw) { errEl.textContent = '새 비밀번호가 일치하지 않습니다.'; return; }

  const hashed = await hashPw(newPw);
  try { localStorage.setItem('att_pw_admin', hashed); } catch(e) {}
  closeModal('changepw-modal');
  showToast('✅ 비밀번호가 변경되었습니다.');
}

function isAdminMode() { return currentMode === 'admin'; }

// 세션 복원 체크
(function() {
  try {
    if (sessionStorage.getItem('att_mode') === 'admin') {
      currentMode = 'admin';
      window._savedMode = 'admin';
    }
  } catch(e) {}
})();

async function init() {
  await loadData();
  loadTeamColors();
  populateTeamFilter();
  initSummaryDashControls();
  initAttControls();
  initSumControls();
  populateAttTeamFilter();
  initLeaveControls();
  initCertControls();
  initIssueControls();
  initHireResignControls();
  loadResignReasons();
  renderSummaryDash();
  renderEmpTable();

  document.addEventListener('keydown', e => {
    if ((e.ctrlKey||e.metaKey) && e.key==='s') { e.preventDefault(); saveData(); }
  });

  // 열람모드 버튼 클릭 전역 차단 (data-view-blocked + body.view-mode 함수 직접 호출 방어)
  document.addEventListener('click', e => {
    if (!document.body.classList.contains('view-mode')) return;
    const btn = e.target.closest('[data-view-blocked="1"]');
    if (btn) { e.preventDefault(); e.stopImmediatePropagation(); }
  }, true);

  // 세션 복원 or 기본 열람모드
  if (window._savedMode === 'admin') {
    applyMode('admin');
  } else {
    applyMode('view');
  }

  setTimeout(loadNotice, 300);
}
init();
